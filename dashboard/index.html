  // ── Per-Stop Breakdown Table ───────────────────────────────────────────
  function renderPerStopBreakdown() {
    var stops = getAllEntities('tour_stops') || [];
    if (stops.length === 0) return '';

    // Sort by arrival date
    stops.sort(function (a, b) {
      return (a.arrival_date || '').localeCompare(b.arrival_date || '');
    });

    var incomes = getAllEntities('income_log') || [];
    var expenses = getAllEntities('expense_log') || [];

    var html = '<div class="section-title">Per-Stop Breakdown</div>';
    html += '<div class="fin-card" style="overflow-x:auto;">';

    // Table header
    html += '<table style="width:100%;border-collapse:collapse;font-size:0.7rem;">' +
      '<thead><tr style="border-bottom:1px solid var(--card-brd);">' +
        '<th style="text-align:left;padding:0.4rem 0.3rem;font-weight:700;color:var(--text-dim);font-size:0.6rem;text-transform:uppercase;">Stop</th>' +
        '<th style="text-align:right;padding:0.4rem 0.3rem;font-weight:700;color:var(--text-dim);font-size:0.6rem;text-transform:uppercase;">Projected</th>' +
        '<th style="text-align:right;padding:0.4rem 0.3rem;font-weight:700;color:var(--text-dim);font-size:0.6rem;text-transform:uppercase;">Actual</th>' +
        '<th style="text-align:right;padding:0.4rem 0.3rem;font-weight:700;color:var(--text-dim);font-size:0.6rem;text-transform:uppercase;">Expenses</th>' +
        '<th style="text-align:right;padding:0.4rem 0.3rem;font-weight:700;color:var(--text-dim);font-size:0.6rem;text-transform:uppercase;">Net</th>' +
        '<th style="text-align:right;padding:0.4rem 0.3rem;font-weight:700;color:var(--text-dim);font-size:0.6rem;text-transform:uppercase;">Δ</th>' +
      '</tr></thead><tbody>';

    var totalProjected = 0, totalActual = 0, totalExp = 0;

    stops.forEach(function (stop) {
      var stopIncomes = incomes.filter(function (i) { return i.tour_stop_id === stop.id; });
      var stopExpenses = expenses.filter(function (e) { return e.tour_stop_id === stop.id; });
      var actual = stopIncomes.reduce(function (s, i) { return s + (Number(i.amount) || 0); }, 0);
      var exp = stopExpenses.reduce(function (s, e) { return s + (Number(e.amount) || 0); }, 0);
      var net = actual - exp;

      var fin = stop.financials || {};
      var projected = fin.projected_income || 0;
      var variance = actual - projected;

      totalProjected += projected;
      totalActual += actual;
      totalExp += exp;

      var netColor = net >= 0 ? 'var(--green-bright)' : 'var(--expense)';
      var varColor = variance >= 0 ? 'var(--green-bright)' : 'var(--amber)';

      html += '<tr style="border-bottom:1px solid rgba(255,255,255,0.03);">' +
        '<td style="padding:0.4rem 0.3rem;font-weight:600;">' + esc(stop.name) + '</td>' +
        '<td style="text-align:right;padding:0.4rem 0.3rem;">' +
          '<input type="number" value="' + projected + '" step="0.01" data-stop-projection="projected_income" data-stop-id="' + esc(stop.id) + '" style="width:70px;text-align:right;padding:0.2rem 0.3rem;border-radius:4px;border:1px solid var(--card-brd);background:rgba(0,0,0,0.3);color:var(--off-white);font-size:0.65rem;" />' +
        '</td>' +
        '<td style="text-align:right;padding:0.4rem 0.3rem;color:var(--green-bright);">' + fmt$(actual) + '</td>' +
        '<td style="text-align:right;padding:0.4rem 0.3rem;color:var(--expense);">' + fmt$(exp) + '</td>' +
        '<td style="text-align:right;padding:0.4rem 0.3rem;font-weight:700;color:' + netColor + ';">' + fmt$(net) + '</td>' +
        '<td style="text-align:right;padding:0.4rem 0.3rem;font-size:0.6rem;color:' + varColor + ';">' + (variance >= 0 ? '+' : '') + fmt$(variance) + '</td>' +
      '</tr>';
    });

    // Totals row
    var totalNet = totalActual - totalExp;
    var totalVar = totalActual - totalProjected;
    var totalNetColor = totalNet >= 0 ? 'var(--green-bright)' : 'var(--expense)';
    var totalVarColor = totalVar >= 0 ? 'var(--green-bright)' : 'var(--amber)';

    html += '<tr style="border-top:2px solid var(--card-brd);font-weight:800;">' +
      '<td style="padding:0.5rem 0.3rem;">TOTAL</td>' +
      '<td style="text-align:right;padding:0.5rem 0.3rem;">' + fmt$(totalProjected) + '</td>' +
      '<td style="text-align:right;padding:0.5rem 0.3rem;color:var(--green-bright);">' + fmt$(totalActual) + '</td>' +
      '<td style="text-align:right;padding:0.5rem 0.3rem;color:var(--expense);">' + fmt$(totalExp) + '</td>' +
      '<td style="text-align:right;padding:0.5rem 0.3rem;color:' + totalNetColor + ';">' + fmt$(totalNet) + '</td>' +
      '<td style="text-align:right;padding:0.5rem 0.3rem;font-size:0.6rem;color:' + totalVarColor + ';">' + (totalVar >= 0 ? '+' : '') + fmt$(totalVar) + '</td>' +
    '</tr>';

    html += '</tbody></table>';
    html += '</div>';

    return html;
  }

  // ── Export Financials as JSON ──────────────────────────────────────────
  function exportFinancialsJSON() {
    var data = loadData() || {};
    var exportObj = {
      exported_at: new Date().toISOString(),
      tour_name: (data.config && data.config.tour_name) || 'Tour',
      tour_target: (data.config && data.config.tour_target) || 37000,
      income_log: getAllEntities('income_log') || [],
      expense_log: getAllEntities('expense_log') || [],
      tour_stops: (getAllEntities('tour_stops') || []).map(function (s) {
        return {
          id: s.id,
          name: s.name,
          state: s.state,
          arrival_date: s.arrival_date,
          departure_date: s.departure_date,
          status: s.status,
          targets: s.targets,
          actuals: s.actuals,
          financials: s.financials
        };
      })
    };

    var json = JSON.stringify(exportObj, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'tour-financials-' + today() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    notify('Financials exported');
  }

  // ── Log Income Modal ───────────────────────────────────────────────────
  function openLogIncomeModal() {
    var currentStop = getCurrentStop();
    var stops = getAllEntities('tour_stops') || [];
    var stopOptions = stops.map(function (s) {
      var isCurrent = currentStop && s.id === currentStop.id;
      return '<option value="' + esc(s.id) + '"' + (isCurrent ? ' selected' : '') + '>' + esc(s.name) + ', ' + esc(s.state || '') + (isCurrent ? ' (current)' : '') + '</option>';
    }).join('');

    var typeOptions = Object.keys(INCOME_TYPES).map(function (t) {
      var info = INCOME_TYPES[t];
      return '<option value="' + t + '">' + info.icon + ' ' + esc(info.label) + '</option>';
    }).join('');

    var html = '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">💰 Log Income</div>' +
        '<button class="modal-close" data-close-sheet="log-income">✕</button>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Income Type</label>' +
        '<select id="v3-income-type">' + typeOptions + '</select>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Amount ($)</label>' +
        '<input type="number" id="v3-income-amount" value="0" min="0" step="0.01" placeholder="0.00" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Date</label>' +
        '<input type="date" id="v3-income-date" value="' + today() + '" />' +
      '</div>' +
      '<div class="modal-field" id="v3-income-source-field">' +
        '<label>Source (linked entity)</label>' +
        '<select id="v3-income-source-entity"><option value="">— Select —</option></select>' +
      '</div>' +
      '<div class="modal-field" id="v3-income-source-manual-field" style="display:none;">' +
        '<label>Source (manual)</label>' +
        '<input type="text" id="v3-income-source" placeholder="Optional description" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Tour Stop</label>' +
        '<select id="v3-income-stop">' + (stopOptions || '<option value="">No stops</option>') + '</select>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Payment Method</label>' +
        '<select id="v3-income-method">' +
          '<option value="cash">💵 Cash</option>' +
          '<option value="bank_transfer">🏦 Bank Transfer</option>' +
          '<option value="paypal">💳 PayPal</option>' +
        '</select>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Notes</label>' +
        '<textarea id="v3-income-notes" rows="2" style="min-height:50px;" placeholder="Optional notes..."></textarea>' +
      '</div>' +
      '<button class="modal-submit" id="v3-income-save">Save Income</button>';

    openModalSheet('log-income', html);

    // Wire up dynamic source-entity dropdown based on income type
    var typeSelect = document.getElementById('v3-income-type');
    if (typeSelect) typeSelect.addEventListener('change', updateIncomeSourceDropdown);
    updateIncomeSourceDropdown();

    var saveBtn = document.getElementById('v3-income-save');
    if (saveBtn) saveBtn.addEventListener('click', saveIncomeEntry);
  }

  function updateIncomeSourceDropdown() {
    var type = (document.getElementById('v3-income-type') || {}).value || 'other';
    var selectEl = document.getElementById('v3-income-source-entity');
    var fieldEl = document.getElementById('v3-income-source-field');
    var manualFieldEl = document.getElementById('v3-income-source-manual-field');
    if (!selectEl || !fieldEl) return;

    var optionsHtml = '<option value="">— Select —</option>';

    if (type === 'gig_income' || type === 'venue') {
      var venues = getAllEntities('venues') || [];
      venues.forEach(function (v) {
        optionsHtml += '<option value="venue:' + esc(v.id) + '">' + esc(v.name) + (v.city ? ', ' + esc(v.city) : '') + '</option>';
      });
    } else if (type === 'house_concert') {
      var hcs = getAllEntities('house_concerts') || [];
      hcs.forEach(function (hc) {
        var label = hc.host_name ? esc(hc.host_name) : esc(hc.id);
        optionsHtml += '<option value="house_concert:' + esc(hc.id) + '">' + label + '</option>';
      });
    } else if (type === 'busking') {
      var spots = getAllEntities('busking_spots') || [];
      spots.forEach(function (s) {
        optionsHtml += '<option value="busking_spot:' + esc(s.id) + '">' + esc(s.name || s.id) + '</option>';
      });
    }

    // Show linked dropdown for entity-backed types, show manual field for others
    if (type === 'gig_income' || type === 'venue' || type === 'house_concert' || type === 'busking') {
      fieldEl.style.display = '';
      manualFieldEl.style.display = 'none';
    } else {
      fieldEl.style.display = 'none';
      manualFieldEl.style.display = '';
    }

    selectEl.innerHTML = optionsHtml;
  }

  function saveIncomeEntry() {
    var type = (document.getElementById('v3-income-type') || {}).value || 'other';
    var amount = parseFloat((document.getElementById('v3-income-amount') || {}).value) || 0;
    var date = (document.getElementById('v3-income-date') || {}).value || today();
    var sourceManual = ((document.getElementById('v3-income-source') || {}).value || '').trim();
    var sourceEntityVal = ((document.getElementById('v3-income-source-entity') || {}).value || '').trim();
    var stopId = (document.getElementById('v3-income-stop') || {}).value || '';
    var method = (document.getElementById('v3-income-method') || {}).value || 'cash';
    var notes = ((document.getElementById('v3-income-notes') || {}).value || '').trim();

    if (amount < 0) {
      notify('Amount cannot be negative');
      return;
    }

    // Parse source entity type and id from dropdown value (format: "entity_type:entity_id")
    var sourceEntityType = '';
    var sourceEntityId = '';
    if (sourceEntityVal && sourceEntityVal.indexOf(':') > -1) {
      var parts = sourceEntityVal.split(':');
      sourceEntityType = parts[0];
      sourceEntityId = parts.slice(1).join(':');
    }

    var entry = {
      id: generateId('inc'),
      date: date,
      type: type,
      amount: amount,
      source_entity_type: sourceEntityType || null,
      source_entity_id: sourceEntityId || null,
      tour_stop_id: stopId,
      payment_method: method,
      merch_sales: 0,
      notes: notes || sourceManual || INCOME_TYPES[type].label,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };

    createEntity('income_log', entry);
    saveData();
    if (stopId) recalculateStop(stopId);

    closeModalSheet('log-income');
    notify('Income logged: ' + fmt$(amount));
    renderMoney();
  }

  // ── Log Expense Modal ──────────────────────────────────────────────────
  function openLogExpenseModal() {
    var currentStop = getCurrentStop();
    var stops = getAllEntities('tour_stops') || [];
    var stopOptions = stops.map(function (s) {
      var isCurrent = currentStop && s.id === currentStop.id;
      return '<option value="' + esc(s.id) + '"' + (isCurrent ? ' selected' : '') + '>' + esc(s.name) + ', ' + esc(s.state || '') + (isCurrent ? ' (current)' : '') + '</option>';
    }).join('');

    var catOptions = Object.keys(EXPENSE_CATEGORIES).map(function (c) {
      var info = EXPENSE_CATEGORIES[c];
      return '<option value="' + c + '">' + info.icon + ' ' + esc(info.label) + '</option>';
    }).join('');

    var html = '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">💸 Log Expense</div>' +
        '<button class="modal-close" data-close-sheet="log-expense">✕</button>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Category</label>' +
        '<select id="v3-expense-cat">' + catOptions + '</select>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Amount ($)</label>' +
        '<input type="number" id="v3-expense-amount" value="0" min="0" step="0.01" placeholder="0.00" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Date</label>' +
        '<input type="date" id="v3-expense-date" value="' + today() + '" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Tour Stop</label>' +
        '<select id="v3-expense-stop">' + (stopOptions || '<option value="">No stops</option>') + '</select>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Description</label>' +
        '<input type="text" id="v3-expense-desc" placeholder="e.g. Diesel fill-up" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Odometer (if vehicle-related)</label>' +
        '<input type="number" id="v3-expense-odo" value="" placeholder="e.g. 45230" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Receipt Reference (optional)</label>' +
        '<input type="text" id="v3-expense-receipt" placeholder="e.g. BP Receipt #12345" />' +
      '</div>' +
      '<button class="modal-submit" id="v3-expense-save" style="background:linear-gradient(135deg, var(--expense), #dc2626);">Save Expense</button>';

    openModalSheet('log-expense', html);

    // Auto-show odometer for vehicle-related categories
    var catSelect = document.getElementById('v3-expense-cat');
    var odoField = document.getElementById('v3-expense-odo');
    if (catSelect && odoField) {
      var odoParent = odoField.closest('.modal-field');
      catSelect.addEventListener('change', function () {
        var isVehicle = this.value === 'fuel' || this.value === 'vehicle_maintenance';
        odoParent.style.opacity = isVehicle ? '1' : '0.4';
      });
    }

    var saveBtn = document.getElementById('v3-expense-save');
    if (saveBtn) saveBtn.addEventListener('click', saveExpenseEntry);
  }

  function saveExpenseEntry() {
    var category = (document.getElementById('v3-expense-cat') || {}).value || 'misc';
    var amount = parseFloat((document.getElementById('v3-expense-amount') || {}).value) || 0;
    var date = (document.getElementById('v3-expense-date') || {}).value || today();
    var stopId = (document.getElementById('v3-expense-stop') || {}).value || '';
    var desc = ((document.getElementById('v3-expense-desc') || {}).value || '').trim();
    var odo = (document.getElementById('v3-expense-odo') || {}).value;
    var receipt = ((document.getElementById('v3-expense-receipt') || {}).value || '').trim();

    if (amount <= 0) {
      notify('Amount must be greater than 0');
      return;
    }

    var isVehicle = category === 'fuel' || category === 'vehicle_maintenance';

    var entry = {
      id: generateId('exp'),
      date: date,
      category: category,
      amount: amount,
      description: desc || EXPENSE_CATEGORIES[category].label,
      tour_stop_id: stopId,
      odometer: odo ? parseInt(odo) : null,
      vehicle_related: isVehicle,
      receipt_ref: receipt,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };

    createEntity('expense_log', entry);
    saveData();
    if (stopId) recalculateStop(stopId);

    closeModalSheet('log-expense');
    notify('Expense logged: ' + fmt$(amount));
    renderMoney();
  }


  // ═══════════════════════════════════════════════════════════════════════
  // PUBLIC API
  // ═══════════════════════════════════════════════════════════════════════

  // Expose render functions globally
  window.renderTour = renderTour;
  window.renderMoney = renderMoney;

  // Expose back button handler for inline onclick
  window._v3TourBack = function () {
    tourState.selectedStopId = null;
    renderTour();
  };

  // Expose for external integration (FAB / Create Sheet)
  window.v3FinanceBusking = {
    renderTour: renderTour,
    renderMoney: renderMoney,
    openLogBuskingSession: function (stopId) {
      var cs = getCurrentStop();
      openLogBuskingSessionModal(stopId || (cs && cs.id));
    },
    openLogIncome: openLogIncomeModal,
    openLogExpense: openLogExpenseModal,
    openAddSpot: function (stopId) {
      var cs = getCurrentStop();
      openAddBuskingSpotModal(stopId || (cs && cs.id));
    },
    // Reset tour detail to route view
    backToRoute: function () {
      tourState.selectedStopId = null;
      tourState.stopDetailTab = 'busking';
      renderTour();
    }
  };

})();

</script>

<!-- ═══ V3 Contacts, Todos & Create Sheet ═══ -->

<script>
// ═════════════════════════════════════════════════════════════════
// TOUR OS v3 — CONTACTS, TODOS & CREATE SHEET MODULE
// Renders People tab and handles + FAB create sheet
// ═════════════════════════════════════════════════════════════════
(function() {
  'use strict';

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d.getTime())) return dateStr;
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate() + ' ' + months[d.getMonth()];
  }

  // ── Render People tab ──────────────────────────────────────────
  window.renderPeople = function() {
    var container = document.getElementById('view-people');
    if (!container) return;

    var contacts = TourOS.getAllEntities('contacts') || [];

    var html = '';

    // Contacts section
    html += '<div class="section-title">👥 Contacts (' + contacts.length + ')</div>';
    if (contacts.length === 0) {
      html += '<div class="empty-state" style="padding:1rem;font-size:0.75rem;">No contacts yet. Tap + to add one.</div>';
    } else {
      contacts.forEach(function(c) {
        html += '<div class="contact-card">' +
          '<div class="entity-hdr">' +
            '<div>' +
              '<div class="contact-name">' + esc(c.name) + '</div>' +
              '<div class="contact-role">' + esc(c.role || '') + (c.org ? ' · ' + esc(c.org) : '') + '</div>' +
            '</div>' +
            '<div>' +
              (c.phone ? '<a href="tel:' + encodeURIComponent(c.phone) + '" style="color:var(--cyan);font-size:1rem;text-decoration:none;" onclick="event.stopPropagation()">📞</a> ' : '') +
              (c.email ? '<a href="mailto:' + encodeURIComponent(c.email) + '" style="color:var(--cyan);font-size:1rem;text-decoration:none;" onclick="event.stopPropagation()">✉️</a>' : '') +
            '</div>' +
          '</div>' +
          (c.phone ? '<div class="contact-info">📞 ' + esc(c.phone) + '</div>' : '') +
          (c.email ? '<div class="contact-info">✉️ ' + esc(c.email) + '</div>' : '') +
          (c.city ? '<div class="contact-info">📍 ' + esc(c.city) + '</div>' : '') +
          (c.notes ? '<div class="contact-info" style="font-style:italic;">' + esc(c.notes) + '</div>' : '') +
        '</div>';
      });
    }

    container.innerHTML = html;
  };

  // ═══════════════════════════════════════════════════════════════
  // CREATE SHEET — opened by + FAB
  // ═══════════════════════════════════════════════════════════════

  var createSheetType = 'contact'; // 'contact' | 'todo' | 'venue' | 'hc'

  window.openCreateSheetModal = function(subtype) {
    if (subtype === 'busking') {
      // Delegate to finance module
      if (window.v3FinanceBusking) {
        v3FinanceBusking.openLogBuskingSession();
      }
      return;
    }
    if (subtype === 'gig_income' || subtype === 'expense') {
      if (subtype === 'gig_income' && window.v3FinanceBusking) {
        v3FinanceBusking.openLogIncome();
      } else if (subtype === 'expense' && window.v3FinanceBusking) {
        v3FinanceBusking.openLogExpense();
      }
      return;
    }

    // Determine initial tab based on current view
    var activeView = document.querySelector('.view-container.active');
    if (activeView) {
      var id = activeView.id;
      if (id === 'view-pipeline') createSheetType = 'venue';
      else if (id === 'view-tour') createSheetType = 'todo';
      else if (id === 'view-people') createSheetType = 'contact';
      else if (id === 'view-money') createSheetType = 'expense';
      else createSheetType = subtype || 'contact';
    } else {
      createSheetType = subtype || 'contact';
    }

    renderCreateSheet();
  };

  function renderCreateSheet() {
    var overlay = document.getElementById('modal-overlay');
    var modal = document.getElementById('modal');
    if (!overlay || !modal) return;

    var html = '';
    // Tab selector
    html += '<div class="create-sheet-tabs">';
    html += '<button class="create-tab ' + (createSheetType === 'contact' ? 'active' : '') + '" data-cs-tab="contact">👤 Contact</button>';
    html += '<button class="create-tab ' + (createSheetType === 'todo' ? 'active' : '') + '" data-cs-tab="todo">📋 Todo</button>';
    html += '<button class="create-tab ' + (createSheetType === 'venue' ? 'active' : '') + '" data-cs-tab="venue">🏢 Venue</button>';
    html += '<button class="create-tab ' + (createSheetType === 'hc' ? 'active' : '') + '" data-cs-tab="hc">🏠 House Concert</button>';
    html += '</div>';

    // Form based on type
    if (createSheetType === 'contact') {
      html += renderContactForm();
    } else if (createSheetType === 'todo') {
      html += renderTodoForm();
    } else if (createSheetType === 'venue') {
      html += renderVenueForm();
    } else if (createSheetType === 'hc') {
      html += renderHCForm();
    }

    modal.innerHTML = html;
    overlay.classList.add('active');

    // Bind tab switching
    modal.querySelectorAll('[data-cs-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        createSheetType = btn.getAttribute('data-cs-tab');
        renderCreateSheet();
      });
    });

    // Bind form submission
    var saveBtn = modal.querySelector('[data-cs-save]');
    if (saveBtn) {
      saveBtn.addEventListener('click', handleCreateSave);
    }

    // Close on overlay click
    overlay.onclick = function(e) {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    };

    // Close button
    var closeBtn = modal.querySelector('[data-cs-close]');
    if (closeBtn) {
      closeBtn.onclick = function() {
        overlay.classList.remove('active');
      };
    }
  }

  function renderContactForm() {
    return '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">👤 Add Contact</div>' +
        '<button class="modal-close" data-cs-close>✕</button>' +
      '</div>' +
      '<div class="modal-field"><label>Name *</label><input type="text" id="cs-contact-name" placeholder="e.g. Jane Smith" /></div>' +
      '<div class="modal-field"><label>Role</label><input type="text" id="cs-contact-role" placeholder="e.g. Venue Booker, Host" /></div>' +
      '<div class="modal-field"><label>Phone</label><input type="tel" id="cs-contact-phone" placeholder="04xx xxx xxx" /></div>' +
      '<div class="modal-field"><label>Email</label><input type="email" id="cs-contact-email" placeholder="name@example.com" /></div>' +
      '<div class="modal-field"><label>Organisation</label><input type="text" id="cs-contact-org" placeholder="e.g. The Irish Rose" /></div>' +
      '<div class="modal-field"><label>City</label><input type="text" id="cs-contact-city" placeholder="e.g. Perth" /></div>' +
      '<button class="modal-submit" data-cs-save>Save Contact</button>';
  }

  function renderTodoForm() {
    return '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">📋 Add Todo</div>' +
        '<button class="modal-close" data-cs-close>✕</button>' +
      '</div>' +
      '<div class="modal-field"><label>Task *</label><input type="text" id="cs-todo-text" placeholder="e.g. Follow up with venue" /></div>' +
      '<div class="modal-field"><label>Category</label><select id="cs-todo-category">' +
        '<option value="venue">Venue</option>' +
        '<option value="house_concert">House Concert</option>' +
        '<option value="ops">Ops</option>' +
        '<option value="content">Content</option>' +
        '<option value="finance">Finance</option>' +
        '<option value="personal">Personal</option>' +
      '</select></div>' +
      '<div class="modal-field"><label>Priority</label><select id="cs-todo-priority">' +
        '<option value="high">High</option>' +
        '<option value="medium" selected>Medium</option>' +
        '<option value="low">Low</option>' +
      '</select></div>' +
      '<div class="modal-field"><label>Due Date</label><input type="date" id="cs-todo-due" /></div>' +
      '<button class="modal-submit" data-cs-save>Save Todo</button>';
  }

  function renderVenueForm() {
    var stops = TourOS.getAllEntities('tour_stops') || [];
    var stopOpts = stops.map(function(s) {
      return '<option value="' + esc(s.id) + '">' + esc(s.name) + ', ' + esc(s.state || '') + '</option>';
    }).join('');

    return '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">🏢 Add Venue</div>' +
        '<button class="modal-close" data-cs-close>✕</button>' +
      '</div>' +
      '<div class="modal-field"><label>Venue Name *</label><input type="text" id="cs-venue-name" placeholder="e.g. The Irish Rose" /></div>' +
      '<div class="modal-field"><label>Contact Name</label><input type="text" id="cs-venue-contact" placeholder="e.g. Dave O\'Brien" /></div>' +
      '<div class="modal-field"><label>Phone</label><input type="tel" id="cs-venue-phone" placeholder="(08) xxxx xxxx" /></div>' +
      '<div class="modal-field"><label>Email</label><input type="email" id="cs-venue-email" placeholder="bookings@venue.com.au" /></div>' +
      '<div class="modal-field"><label>Venue Type</label><input type="text" id="cs-venue-type" placeholder="e.g. Irish Pub, Café/Bar" /></div>' +
      '<div class="modal-field"><label>City</label><input type="text" id="cs-venue-city" placeholder="e.g. Perth" /></div>' +
      '<div class="modal-field"><label>State</label><input type="text" id="cs-venue-state" placeholder="e.g. WA" /></div>' +
      '<div class="modal-field"><label>Tour Stop</label><select id="cs-venue-stop">' + (stopOpts || '<option value="">No stops</option>') + '</select></div>' +
      '<div class="modal-field"><label>Priority</label><select id="cs-venue-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>' +
      '<button class="modal-submit" data-cs-save>Save Venue</button>';
  }

  function renderHCForm() {
    var stops = TourOS.getAllEntities('tour_stops') || [];
    var stopOpts = stops.map(function(s) {
      return '<option value="' + esc(s.id) + '">' + esc(s.name) + ', ' + esc(s.state || '') + '</option>';
    }).join('');

    return '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">🏠 Add House Concert</div>' +
        '<button class="modal-close" data-cs-close>✕</button>' +
      '</div>' +
      '<div class="modal-field"><label>Host Name *</label><input type="text" id="cs-hc-host" placeholder="e.g. Sarah Mitchell" /></div>' +
      '<div class="modal-field"><label>Host Phone</label><input type="tel" id="cs-hc-phone" placeholder="04xx xxx xxx" /></div>' +
      '<div class="modal-field"><label>Host Email</label><input type="email" id="cs-hc-email" placeholder="host@example.com" /></div>' +
      '<div class="modal-field"><label>Source</label><select id="cs-hc-source">' +
        '<option value="Facebook group">Facebook group</option>' +
        '<option value="Venue referral">Venue referral</option>' +
        '<option value="Word of mouth">Word of mouth</option>' +
        '<option value="Instagram">Instagram</option>' +
        '<option value="Other">Other</option>' +
      '</select></div>' +
      '<div class="modal-field"><label>Tour Stop</label><select id="cs-hc-stop">' + (stopOpts || '<option value="">No stops</option>') + '</select></div>' +
      '<button class="modal-submit" data-cs-save>Save House Concert</button>';
  }

  function val(id) {
    var el = document.getElementById(id);
    return el ? el.value.trim() : '';
  }

  function handleCreateSave() {
    var today = new Date().toISOString().slice(0, 10);

    if (createSheetType === 'contact') {
      var name = val('cs-contact-name');
      if (!name) { showToast('⚠ Name is required'); return; }
      TourOS.createEntity('contacts', {
        name: name,
        role: val('cs-contact-role'),
        phone: val('cs-contact-phone'),
        email: val('cs-contact-email'),
        org: val('cs-contact-org'),
        city: val('cs-contact-city'),
        tags: [],
        source: '',
        linked_entity_type: '',
        linked_entity_id: '',
        notes: '',
        last_contacted_date: '',
        status: 'active'
      });
      TourOS.saveData();
      showToast('✓ Contact added: ' + name);
      closeModal();
      renderPeople();

    } else if (createSheetType === 'todo') {
      var text = val('cs-todo-text');
      if (!text) { showToast('⚠ Task is required'); return; }
      TourOS.createEntity('todos', {
        text: text,
        category: val('cs-todo-category'),
        priority: val('cs-todo-priority'),
        due_date: val('cs-todo-due') || null,
        completed: false,
        completed_at: null,
        auto_generated: false,
        source_entity_type: null,
        source_entity_id: null
      });
      TourOS.saveData();
      showToast('✓ Todo added');
      closeModal();
      renderTour();

    } else if (createSheetType === 'venue') {
      var vname = val('cs-venue-name');
      if (!vname) { showToast('⚠ Venue name is required'); return; }
      var stopId = val('cs-venue-stop');
      var venue = {
        name: vname,
        phone: val('cs-venue-phone'),
        email: val('cs-venue-email'),
        contact_name: val('cs-venue-contact'),
        contact_id: null,
        type: val('cs-venue-type'),
        city: val('cs-venue-city'),
        state: val('cs-venue-state'),
        priority: val('cs-venue-priority'),
        tour_stop_id: stopId || null,
        stage: 'not_contacted',
        stage_history: [{ stage: 'not_contacted', date: today, notes: 'Added to pipeline' }],
        follow_up_count: 0,
        first_contacted_date: null,
        gig: null,
        marketing: { epk_sent: false, epk_sent_date: null, media_pack_sent: false, media_pack_sent_date: null, tcs_sent: false, tcs_sent_date: null, reels_captured: false, venue_tagged: false, content_notes: '' },
        decline_reason: null,
        tags: [],
        status: 'active'
      };
      venue = TourOS.createEntity('venues', venue);

      // Link to stop
      if (stopId) {
        var stop = TourOS.getEntity('tour_stops', stopId);
        if (stop) {
          if (!stop.venue_ids) stop.venue_ids = [];
          stop.venue_ids.push(venue.id);
          TourOS.updateEntity('tour_stops', stopId, stop);
        }
      }
      TourOS.saveData();
      showToast('✓ Venue added: ' + vname);
      closeModal();
      if (typeof renderPipeline === 'function') renderPipeline();

    } else if (createSheetType === 'hc') {
      var hostName = val('cs-hc-host');
      if (!hostName) { showToast('⚠ Host name is required'); return; }
      var hcStopId = val('cs-hc-stop');
      var hc = {
        host_name: hostName,
        host_phone: val('cs-hc-phone'),
        host_email: val('cs-hc-email'),
        host_contact_id: null,
        source: val('cs-hc-source'),
        source_detail: '',
        tour_stop_id: hcStopId || null,
        stage: 'posted',
        stage_history: [{ stage: 'posted', date: today, notes: 'Added to pipeline' }],
        event: null,
        marketing: { promo_kit_sent: false, promo_kit_sent_date: null, invite_generated: false, invite_url: null, host_posted_socials: false, reels_captured: false, content_notes: '' },
        tags: [],
        status: 'active'
      };
      hc = TourOS.createEntity('house_concerts', hc);

      // Link to stop
      if (hcStopId) {
        var hcStop = TourOS.getEntity('tour_stops', hcStopId);
        if (hcStop) {
          if (!hcStop.house_concert_ids) hcStop.house_concert_ids = [];
          hcStop.house_concert_ids.push(hc.id);
          TourOS.updateEntity('tour_stops', hcStopId, hcStop);
        }
      }
      TourOS.saveData();
      showToast('✓ House concert added: ' + hostName);
      closeModal();
      if (typeof renderPipeline === 'function') renderPipeline();
    }
  }

  function closeModal() {
    var overlay = document.getElementById('modal-overlay');
    if (overlay) overlay.classList.remove('active');
  }

})();
</script>


<!-- ═══ Init ═══ -->

<script>
// ═════════════════════════════════════════════════════════════════
// INIT — Tab navigation, FAB wiring, default view
// ═════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  // Load data
  TourOS.loadData();

  // ── Tab navigation ─────────────────────────────────────────────
  var navItems = document.querySelectorAll('.nav-item');
  var views = document.querySelectorAll('.view-container');

  function switchTab(tabName) {
    // Update nav
    navItems.forEach(function(n) {
      n.classList.toggle('active', n.getAttribute('data-tab') === tabName);
    });
    // Update views
    views.forEach(function(v) {
      v.classList.toggle('active', v.id === 'view-' + tabName);
    });
    // Render the active view
    try {
      switch (tabName) {
        case 'home':     if (typeof renderCommandCenter === 'function') renderCommandCenter(); break;
        case 'pipeline': if (typeof renderPipeline === 'function') renderPipeline(); break;
        case 'tour':     if (typeof renderTour === 'function') renderTour(); break;
        case 'people':   if (typeof renderPeople === 'function') renderPeople(); break;
        case 'money':    if (typeof renderMoney === 'function') renderMoney(); break;
      }
    } catch (e) {
      console.error('[Init] Render error for tab "' + tabName + '":', e);
    }
  }

  navItems.forEach(function(item) {
    item.addEventListener('click', function() {
      switchTab(item.getAttribute('data-tab'));
    });
  });

  // ── FAB ────────────────────────────────────────────────────────
  var fab = document.getElementById('fab');
  if (fab) {
    fab.addEventListener('click', function() {
      if (typeof openCreateSheetModal === 'function') {
        openCreateSheetModal();
      }
    });
  }

  // ── Settings button ────────────────────────────────────────────
  var settingsBtn = document.getElementById('settings-btn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', function() {
      var overlay = document.getElementById('modal-overlay');
      var modal = document.getElementById('modal');
      if (!overlay || !modal) return;
      var html = '';
      html += '<div class="modal-hdr">';
      html += '<div class="modal-title">⚙️ Settings</div>';
      html += '<button class="modal-close" onclick="closeModal(\'modal-overlay\')">✕</button>';
      html += '</div>';
      html += '<div style="padding:0.5rem 0">';
      // Export
      html += '<button class="venue-btn" style="width:100%;margin-bottom:0.5rem" onclick="exportData()">📥 Export Data (JSON)</button>';
      // Import
      html += '<button class="venue-btn" style="width:100%;margin-bottom:0.5rem" onclick="var j=prompt(\'Paste JSON data to import:\');if(j)importData(j)">📤 Import Data</button>';
      // Reset
      html += '<button class="venue-btn" style="width:100%;color:var(--expense);border-color:rgba(239,68,68,0.3)" onclick="if(confirm(\'Reset all data to seed data? This will erase your changes.\')){TourOS.resetToSeed();window.D=TourOS.getData();showToast(\'✓ Data reset to seed\');switchTab(\'home\');closeModal(\'modal-overlay\');}">🗑 Reset to Seed Data</button>';
      html += '</div>';
      modal.innerHTML = html;
      overlay.classList.add('active');
      overlay.classList.add('show');
      overlay.style.display = 'flex';
    });
  }

  // ── Show Home tab by default ───────────────────────────────────
  switchTab('home');
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dylan Crowe — Tour OS</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   DYLAN CROWE — MUSICIAN BUSINESS OS v2.0
   One Guitar. One Dog. Every Town in Australia.
   ═══════════════════════════════════════════════════════════════ */
:root {
  --bg: #090912;
  --bg-grad: radial-gradient(ellipse at 50% -10%, #1a1a3e 0%, #090912 55%, #06060c 100%);
  --card: rgba(255,255,255,0.03);
  --card-h: rgba(255,255,255,0.06);
  --card-brd: rgba(255,255,255,0.08);
  --glass: rgba(10,10,20,0.88);

  /* Stream colors */
  --busking: #166534;
  --busking-l: #22c55e;
  --gig: #00B4D8;
  --gig-l: #00d2ff;
  --house: #D97706;
  --house-l: #f59e0b;
  --merch: #a855f7;
  --expense: #ef4444;

  /* Brand */
  --cyan: #00d2ff;
  --magenta: #D946EF;
  --amber: #D97706;
  --green: #166534;
  --blue-bg: #1A1A3E;
  --off-white: #F5F0E8;
  --text-dim: rgba(245,240,232,0.55);
  --text-faint: rgba(245,240,232,0.35);

  /* Pipeline stage colors */
  --st-not_contacted: #6b7280;
  --st-called: #3b82f6;
  --st-emailed: #8b5cf6;
  --st-follow_up_1: #f59e0b;
  --st-follow_up_2: #f97316;
  --st-booked: #22c55e;
  --st-declined: #ef4444;
  --st-played: #14b8a6;

  /* Status colors */
  --st-Planned: #6b7280;
  --st-Current: #22c55e;
  --st-Completed: #14b8a6;
  --st-Skipped: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  margin:0; padding:0; width:100%; overflow-x:hidden;
  background: var(--bg);
  color: var(--off-white);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  -webkit-text-size-adjust:100%; -webkit-font-smoothing:antialiased;
  font-size:15px; line-height:1.5;
}

body { background: var(--bg-grad); min-height:100vh; }

/* ── HEADER ─────────────────────────────────────────────────────── */
.hdr {
  position: sticky; top:0; z-index:100;
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-brd);
  padding: 0.65rem 1rem; display:flex; align-items:center; justify-content:space-between;
}
.hdr-logo { display:flex; align-items:center; gap:0.5rem; }
.hdr-logo img { width:28px; height:28px; border-radius:6px; }
.hdr-title { font-size:0.8rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; }
.hdr-sub { font-size:0.65rem; color:var(--text-dim); }
.hdr-eta { font-size:0.7rem; color:var(--cyan); font-weight:600; }

/* ── VIEWS ──────────────────────────────────────────────────────── */
.view { display:none; padding:1rem; padding-bottom:6rem; }
.view.active { display:block; }

/* ── STAT CARDS ──────────────────────────────────────────────────── */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:1rem; }
.stat-card {
  background: var(--card); border:1px solid var(--card-brd);
  border-radius:14px; padding:0.85rem;
}
.stat-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-dim); }
.stat-val { font-size:1.5rem; font-weight:800; margin:0.2rem 0; }
.stat-sub { font-size:0.7rem; color:var(--text-dim); }
.stat-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.08); margin-top:0.5rem; overflow:hidden; }
.stat-bar-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }

/* ── SECTION ────────────────────────────────────────────────────── */
.section { margin-bottom:1.2rem; }
.section-title {
  font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em;
  color:var(--text-dim); margin-bottom:0.6rem; font-weight:600;
}

/* ── STREAM SUMMARY ─────────────────────────────────────────────── */
.stream-card {
  background: var(--card); border:1px solid var(--card-brd);
  border-radius:12px; padding:0.8rem; margin-bottom:0.6rem;
  display:flex; align-items:center; gap:0.8rem;
}
.stream-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.stream-icon.busking { background:rgba(22,101,52,0.2); color:var(--busking-l); }
.stream-icon.gig { background:rgba(0,180,216,0.15); color:var(--gig-l); }
.stream-icon.house { background:rgba(217,119,6,0.2); color:var(--house-l); }
.stream-body { flex:1; min-width:0; }
.stream-name { font-size:0.8rem; font-weight:700; }
.stream-amt { font-size:0.75rem; color:var(--text-dim); }
.stream-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.06); margin-top:0.4rem; overflow:hidden; }
.stream-bar-fill { height:100%; border-radius:2px; }
.stream-bar-fill.busking { background:var(--busking-l); }
.stream-bar-fill.gig { background:var(--gig-l); }
.stream-bar-fill.house { background:var(--house-l); }

/* ── TOUR ROUTE TIMELINE ────────────────────────────────────────── */
.timeline { position:relative; padding-left:2rem; }
.timeline::before { content:''; position:absolute; left:0.75rem; top:0; bottom:0; width:2px; background:rgba(255,255,255,0.06); }
.stop-node { position:relative; margin-bottom:0.5rem; }
.stop-dot {
  position:absolute; left:-1.75rem; top:0.8rem; width:14px; height:14px;
  border-radius:50%; border:2px solid var(--card-brd); background:var(--bg); z-index:1;
}
.stop-dot.current { background:var(--st-Current); border-color:var(--st-Current); box-shadow:0 0 12px rgba(34,197,94,0.5); }
.stop-dot.completed { background:var(--st-Completed); border-color:var(--st-Completed); }
.stop-dot.planned { background:var(--bg); border-color:rgba(255,255,255,0.15); }
.stop-dot.target { background:var(--magenta); border-color:var(--magenta); }

.stop-card {
  background: var(--card); border:1px solid var(--card-brd);
  border-radius:12px; padding:0.8rem; cursor:pointer;
  transition: background 0.2s;
}
.stop-card:active { background: var(--card-h); }
.stop-card.active { border-color: var(--cyan); box-shadow:0 0 0 1px rgba(0,210,255,0.2); }
.stop-hdr { display:flex; justify-content:space-between; align-items:center; }
.stop-name { font-size:0.9rem; font-weight:700; }
.stop-num { font-size:0.65rem; color:var(--text-faint); }
.stop-meta { font-size:0.65rem; color:var(--text-dim); margin-top:0.15rem; }
.stop-bars { display:flex; gap:0.3rem; margin-top:0.5rem; }
.stop-bar { flex:1; height:3px; border-radius:1.5px; overflow:hidden; background:rgba(255,255,255,0.06); }
.stop-bar-fill { height:100%; border-radius:1.5px; }
.stop-bar-fill.busking { background:var(--busking-l); }
.stop-bar-fill.gig { background:var(--gig-l); }
.stop-bar-fill.house { background:var(--house-l); }
.stop-expand { margin-top:0.6rem; display:none; }
.stop-expand.show { display:block; }
.stop-expand .stream-mini { font-size:0.7rem; margin-bottom:0.3rem; display:flex; justify-content:space-between; }
.stop-badge {
  font-size:0.55rem; padding:2px 6px; border-radius:4px;
  text-transform:uppercase; letter-spacing:0.05em; font-weight:700;
}
.stop-badge.current { background:rgba(34,197,94,0.15); color:var(--st-Current); }
.stop-badge.planned { background:rgba(255,255,255,0.05); color:var(--text-dim); }
.stop-badge.completed { background:rgba(20,184,166,0.15); color:var(--st-Completed); }
.stop-badge.target { background:rgba(217,70,239,0.15); color:var(--magenta); }

/* ── TABS (Stop Detail) ─────────────────────────────────────────── */
.tab-bar {
  display:flex; gap:0.25rem; margin-bottom:0.8rem;
  background:var(--card); border-radius:10px; padding:3px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.tab-btn {
  flex:1; min-width:max-content; padding:0.5rem 0.65rem; border:none;
  background:transparent; color:var(--text-dim); font-size:0.7rem; font-weight:600;
  border-radius:8px; cursor:pointer; white-space:nowrap; transition:all 0.2s;
  font-family:inherit;
}
.tab-btn.active { background:rgba(255,255,255,0.06); color:var(--off-white); }
.tab-btn.active.busking { color:var(--busking-l); background:rgba(22,101,52,0.15); }
.tab-btn.active.gig { color:var(--gig-l); background:rgba(0,180,216,0.12); }
.tab-btn.active.house { color:var(--house-l); background:rgba(217,119,6,0.12); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── ENTITY CARDS ───────────────────────────────────────────────── */
.entity-card {
  background:var(--card); border:1px solid var(--card-brd);
  border-radius:10px; padding:0.75rem; margin-bottom:0.5rem;
}
.entity-hdr { display:flex; justify-content:space-between; align-items:flex-start; }
.entity-name { font-size:0.85rem; font-weight:700; }
.entity-sub { font-size:0.7rem; color:var(--text-dim); margin-top:0.15rem; }
.entity-row { display:flex; justify-content:space-between; font-size:0.72rem; margin-top:0.3rem; }
.entity-row .lbl { color:var(--text-dim); }

/* ── PIPELINE ───────────────────────────────────────────────────── */
.pipe-group { margin-bottom:1rem; }
.pipe-group-title {
  font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
  margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem;
}
.pipe-count { font-size:0.6rem; background:rgba(255,255,255,0.06); padding:1px 6px; border-radius:4px; }
.venue-card {
  background:var(--card); border:1px solid var(--card-brd);
  border-left:3px solid var(--st-not_contacted);
  border-radius:8px; padding:0.7rem; margin-bottom:0.4rem; cursor:pointer;
  transition:background 0.2s;
}
.venue-card:active { background:var(--card-h); }
.venue-card.stage-booked { border-left-color:var(--st-booked); }
.venue-card.stage-called { border-left-color:var(--st-called); }
.venue-card.stage-emailed { border-left-color:var(--st-emailed); }
.venue-card.stage-follow_up_1 { border-left-color:var(--st-follow_up_1); }
.venue-card.stage-follow_up_2 { border-left-color:var(--st-follow_up_2); }
.venue-card.stage-not_contacted { border-left-color:var(--st-not_contacted); }
.venue-card.stage-played { border-left-color:var(--st-played); }
.venue-card.stage-declined { border-left-color:var(--st-declined); }
.venue-name { font-size:0.82rem; font-weight:700; }
.venue-meta { font-size:0.68rem; color:var(--text-dim); margin-top:0.15rem; }
.venue-stage-badge {
  font-size:0.55rem; padding:2px 6px; border-radius:4px;
  text-transform:uppercase; letter-spacing:0.04em; font-weight:700;
  display:inline-block; margin-top:0.3rem;
}
.venue-actions { display:flex; gap:0.4rem; margin-top:0.5rem; }
.venue-btn {
  font-size:0.65rem; padding:0.35rem 0.6rem; border-radius:6px;
  border:1px solid var(--card-brd); background:transparent;
  color:var(--off-white); cursor:pointer; font-family:inherit;
}
.venue-btn:active { background:var(--card-h); }
.venue-btn.call { color:var(--cyan); border-color:rgba(0,210,255,0.3); }
.venue-btn.advance { color:var(--st-booked); border-color:rgba(34,197,94,0.3); }

/* ── FINANCIALS ─────────────────────────────────────────────────── */
.fin-card {
  background:var(--card); border:1px solid var(--card-brd);
  border-radius:12px; padding:0.85rem; margin-bottom:0.6rem;
}
.fin-row { display:flex; justify-content:space-between; font-size:0.75rem; margin:0.3rem 0; }
.fin-row .lbl { color:var(--text-dim); }
.fin-row .val { font-weight:600; }
.fin-row.income .val { color:var(--st-booked); }
.fin-row.expense .val { color:var(--expense); }
.fin-total {
  border-top:1px solid var(--card-brd); margin-top:0.5rem; padding-top:0.5rem;
  font-size:0.85rem; font-weight:800;
}

.fin-stop-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:0.5rem 0; border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:0.72rem;
}
.fin-stop-row:last-child { border-bottom:none; }

/* ── TODOS ──────────────────────────────────────────────────────── */
.todo-item {
  display:flex; align-items:center; gap:0.6rem;
  background:var(--card); border:1px solid var(--card-brd);
  border-radius:8px; padding:0.6rem 0.75rem; margin-bottom:0.35rem;
}
.todo-check {
  width:22px; height:22px; border-radius:6px; border:2px solid var(--card-brd);
  flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.todo-check.done { background:var(--st-Current); border-color:var(--st-Current); }
.todo-check.done::after { content:'✓'; color:white; font-size:0.7rem; font-weight:700; }
.todo-text { font-size:0.78rem; flex:1; }
.todo-text.done { text-decoration:line-through; color:var(--text-faint); }
.todo-badge {
  font-size:0.5rem; padding:2px 5px; border-radius:3px;
  text-transform:uppercase; letter-spacing:0.03em; flex-shrink:0; font-weight:700;
}
.todo-badge.busking { background:rgba(22,101,52,0.2); color:var(--busking-l); }
.todo-badge.venue { background:rgba(0,180,216,0.12); color:var(--gig-l); }
.todo-badge.house_concert { background:rgba(217,119,6,0.15); color:var(--house-l); }
.todo-badge.marketing { background:rgba(168,85,247,0.12); color:var(--merch); }
.todo-badge.vehicle { background:rgba(239,68,68,0.1); color:var(--expense); }
.todo-badge.ops { background:rgba(255,255,255,0.06); color:var(--text-dim); }

/* ── QUICK-LOG FAB ──────────────────────────────────────────────── */
.fab {
  position:fixed; bottom:5rem; right:1rem; z-index:200;
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg, var(--magenta), #b030d0);
  border:none; color:white; font-size:1.5rem;
  box-shadow:0 4px 16px rgba(217,70,239,0.4);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform 0.2s;
}
.fab:active { transform:scale(0.9); }

/* ── BOTTOM TAB BAR ─────────────────────────────────────────────── */
.bottom-tabs {
  position:fixed; bottom:0; left:0; right:0; z-index:150;
  background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--card-brd);
  display:flex; padding:0.35rem 0.25rem; padding-bottom:env(safe-area-inset-bottom,0.35rem);
}
.bt-tab {
  flex:1; background:none; border:none; color:var(--text-faint);
  font-family:inherit; font-size:0.58rem; font-weight:600;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:0.4rem 0.15rem; cursor:pointer; transition:color 0.2s;
  min-height:44px; justify-content:center;
}
.bt-tab .bt-icon { font-size:1.15rem; }
.bt-tab.active { color:var(--cyan); }
.bt-tab.active::before {
  content:''; position:absolute; top:0; width:24px; height:2px;
  background:var(--cyan); border-radius:0 0 2px 2px;
}

/* ── MODAL ──────────────────────────────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal-sheet {
  background:var(--glass); border:1px solid var(--card-brd);
  border-radius:16px 16px 0 0; width:100%; max-width:500px;
  padding:1rem; max-height:85vh; overflow-y:auto;
  animation:slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; }
.modal-title { font-size:0.9rem; font-weight:700; }
.modal-close {
  width:28px; height:28px; border-radius:50%; border:none;
  background:rgba(255,255,255,0.06); color:var(--off-white);
  font-size:1rem; cursor:pointer; font-family:inherit;
}
.modal-type-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.5rem; margin-bottom:0.8rem; }
.modal-type-btn {
  padding:0.6rem; border-radius:10px; border:1px solid var(--card-brd);
  background:var(--card); color:var(--off-white); font-family:inherit;
  font-size:0.75rem; font-weight:600; cursor:pointer; text-align:center;
  transition:all 0.2s;
}
.modal-type-btn:active { background:var(--card-h); }
.modal-type-btn.active { border-color:var(--cyan); background:rgba(0,210,255,0.08); }
.modal-field { margin-bottom:0.6rem; }
.modal-field label { display:block; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); margin-bottom:0.25rem; }
.modal-field input, .modal-field select, .modal-field textarea {
  width:100%; padding:0.6rem; border-radius:8px;
  border:1px solid var(--card-brd); background:rgba(0,0,0,0.3);
  color:var(--off-white); font-family:inherit; font-size:0.85rem;
  min-height:44px;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
  outline:none; border-color:var(--cyan);
}
.modal-submit {
  width:100%; padding:0.7rem; border-radius:10px; border:none;
  background:linear-gradient(135deg, var(--cyan), #0090b0);
  color:white; font-family:inherit; font-size:0.85rem; font-weight:700;
  cursor:pointer; margin-top:0.4rem;
}
.modal-submit:active { opacity:0.8; }

/* ── STOP DETAIL HEADER ─────────────────────────────────────────── */
.stop-detail-hdr {
  background:var(--card); border:1px solid var(--card-brd);
  border-radius:12px; padding:0.85rem; margin-bottom:0.8rem;
}
.stop-detail-name { font-size:1.1rem; font-weight:800; }
.stop-detail-meta { font-size:0.7rem; color:var(--text-dim); margin-top:0.15rem; }

/* ── PRIORITIES ────────────────────────────────────────────────── */
.priority-item {
  display:flex; align-items:center; gap:0.6rem;
  padding:0.6rem 0.75rem; background:var(--card);
  border:1px solid var(--card-brd); border-radius:8px;
  margin-bottom:0.35rem;
}
.priority-icon { font-size:1rem; flex-shrink:0; }
.priority-text { font-size:0.75rem; }
.priority-tag {
  font-size:0.55rem; padding:2px 5px; border-radius:3px;
  text-transform:uppercase; font-weight:700; flex-shrink:0; margin-left:auto;
}

/* ── MISC ───────────────────────────────────────────────────────── */
.empty-state { text-align:center; padding:2rem; color:var(--text-faint); font-size:0.8rem; }
.clickable { cursor:pointer; }
.text-cyan { color:var(--cyan); }
.text-green { color:var(--busking-l); }
.text-amber { color:var(--house-l); }
.text-dim { color:var(--text-dim); }
.fmt-money { font-variant-numeric:tabular-nums; }
.pct-badge { font-size:0.6rem; font-weight:700; padding:1px 5px; border-radius:3px; }

/* Responsive */
@media(min-width:768px) {
  .stat-grid { grid-template-columns:repeat(4,1fr); }
  .modal-sheet { border-radius:16px; max-width:450px; margin-bottom:1rem; }
}
@media(max-width:360px) {
  body { font-size:14px; }
  .stat-val { font-size:1.2rem; }
}

/* ═══ V2.1 WORKFLOW ADDITIONS ═══ */

/* Add Venue FAB */
.fab.add-venue {
  bottom: 11rem; background: linear-gradient(135deg, var(--gig-l), #007a96);
  box-shadow: 0 4px 16px rgba(0,180,216,0.4); width:44px; height:44px; font-size:1.2rem;
}

/* Follow-up alert badge */
.followup-alert {
  font-size:0.55rem; padding:2px 6px; border-radius:4px;
  background:rgba(245,158,11,0.15); color:#f59e0b; font-weight:700;
  display:inline-block; margin-top:0.2rem; animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* Venue detail modal */
.venue-detail-hdr { border-bottom:1px solid var(--card-brd); padding-bottom:0.6rem; margin-bottom:0.6rem; }
.stage-timeline { display:flex; gap:2px; flex-wrap:wrap; margin:0.5rem 0; }
.stage-tl-item { font-size:0.55rem; padding:2px 6px; border-radius:3px; background:rgba(255,255,255,0.04); }
.stage-tl-arrow { color:var(--text-faint); font-size:0.5rem; align-self:center; }

/* Marketing checklist */
.mkt-check { display:flex; align-items:center; gap:0.5rem; padding:0.4rem; margin-bottom:0.25rem; background:rgba(255,255,255,0.02); border-radius:6px; cursor:pointer; }
.mkt-check.done { opacity:0.6; }
.mkt-check .todo-check { width:20px; height:20px; }
.mkt-check .todo-text { font-size:0.72rem; }

/* Filter bar */
.filter-bar { display:flex; gap:0.4rem; margin-bottom:0.8rem; flex-wrap:wrap; }
.filter-bar select, .filter-bar input {
  flex:1; min-width:100px; padding:0.4rem; border-radius:6px;
  border:1px solid var(--card-brd); background:rgba(0,0,0,0.3); color:var(--off-white);
  font-family:inherit; font-size:0.7rem; min-height:36px;
}

/* House concert FB tracker */
.fb-tracker { margin-top:0.5rem; }
.fb-tracker-row {
  display:flex; align-items:center; gap:0.4rem; padding:0.35rem;
  background:rgba(255,255,255,0.02); border-radius:6px; margin-bottom:0.2rem; font-size:0.68rem;
}
.fb-tracker-row .todo-check { width:18px; height:18px; }
.fb-group-name { flex:1; }
.fb-post-date { color:var(--text-dim); font-size:0.6rem; }
.fb-resp-count { font-size:0.6rem; color:var(--amber); font-weight:600; }

/* HC posting schedule */
.hc-schedule { background:rgba(217,119,6,0.05); border:1px solid rgba(217,119,6,0.15); border-radius:8px; padding:0.6rem; margin-bottom:0.6rem; }
.hc-schedule-title { font-size:0.65rem; font-weight:700; color:var(--house-l); margin-bottom:0.4rem; }
.hc-schedule-row { display:flex; justify-content:space-between; font-size:0.62rem; margin:0.2rem 0; }
.hc-schedule-row.done span:last-child { color:var(--st-booked); }

/* Stop management buttons */
.stop-actions { display:flex; gap:0.3rem; margin-top:0.4rem; }
.stop-btn {
  font-size:0.6rem; padding:0.3rem 0.5rem; border-radius:6px;
  border:1px solid var(--card-brd); background:transparent; color:var(--text-dim);
  cursor:pointer; font-family:inherit; min-height:32px;
}
.stop-btn:active { background:var(--card-h); }
.stop-btn.current { color:var(--st-Current); border-color:rgba(34,197,94,0.3); }
.stop-btn.delete { color:var(--expense); }

/* Session log entries */
.session-log-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:0.4rem 0.5rem; background:rgba(255,255,255,0.02); border-radius:6px;
  margin-bottom:0.2rem; font-size:0.7rem;
}
.session-log-del {
  width:24px; height:24px; border-radius:6px; border:none;
  background:rgba(239,68,68,0.1); color:var(--expense); font-size:0.8rem;
  cursor:pointer; flex-shrink:0;
}

/* Inline edit inputs */
.inline-edit {
  width:50px; padding:2px 4px; border-radius:4px;
  border:1px solid var(--card-brd); background:rgba(0,0,0,0.3); color:var(--off-white);
  font-family:inherit; font-size:0.65rem; text-align:center;
}

</style>
</head>

<script src="data.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// MUSICIAN OS v2.0 — Dashboard Controller
// ═══════════════════════════════════════════════════════════════
const BRAND = {
  busking: '#22c55e', gig: '#00d2ff', house: '#f59e0b', merch: '#a855f7', expense: '#ef4444'
};
const STAGE_COLORS = {
  not_contacted:'#6b7280', called:'#3b82f6', emailed:'#8b5cf6',
  follow_up_1:'#f59e0b', follow_up_2:'#f97316',
  booked:'#22c55e', declined:'#ef4444', played:'#14b8a6'
};
const STAGE_LABELS = {
  not_contacted:'Not Contacted', called:'Called', emailed:'Emailed',
  follow_up_1:'Follow Up 1', follow_up_2:'Follow Up 2',
  booked:'Booked', declined:'Declined', played:'Played'
};
const HC_STAGES = ['posted','interested','confirmed','completed','cancelled'];
const VENUE_STAGES = ['not_contacted','called','emailed','follow_up_1','follow_up_2','booked','declined','played'];

// Load data
let D = null;
let selectedStopId = null;
let activeTab = 'busking';
let qlType = 'busking';

function loadData() {
  if (typeof window.DASHBOARD_DATA !== 'undefined') {
    D = JSON.parse(JSON.stringify(window.DASHBOARD_DATA));
  }
  // Overlay localStorage changes
  try {
    const saved = localStorage.getItem('tourOS_edits');
    if (saved) {
      const edits = JSON.parse(saved);
      // For now, simple merge — full implementation would patch individual entities
    }
  } catch(e) {}
  if (!D) {
    D = { meta:{}, config:{}, tour_stops:[], busking_spots:[], venues:[], house_concerts:[], financials:{}, ground_ops:{}, todos:[], income_history:[], expense_history:[], booking_summary:{}, marketing:[] };
  }
}

function saveEdits() {
  // Save to localStorage for offline persistence
  try { localStorage.setItem('tourOS_data', JSON.stringify(D)); } catch(e) {}
}

function fmt$(n) {
  if (n === null || n === undefined) return '$0';
  return '$' + Number(n).toLocaleString('en-AU', {maximumFractionDigits:0});
}
function fmtPct(n) {
  return Math.round((n||0)) + '%';
}
function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

function getCurrentStop() {
  if (!D.tour_stops) return null;
  return D.tour_stops.find(s => s.status === 'Current') || D.tour_stops[0];
}

function getStopVenues(stopId) {
  return (D.venues||[]).filter(v => v.tour_stop_id === stopId);
}
function getStopBuskingSpots(stopId) {
  return (D.busking_spots||[]).filter(b => b.tour_stop_id === stopId);
}
function getStopHouseConcerts(stopId) {
  return (D.house_concerts||[]).filter(h => h.tour_stop_id === stopId);
}

// ═══ VIEW SWITCHING ═══
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.bt-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.bt-tab[data-view="${view}"]`).classList.add('active');

  if (view === 'command') renderCommand();
  if (view === 'route') renderRoute();
  if (view === 'stop') renderStopDetail();
  if (view === 'pipeline') renderPipeline();
  if (view === 'fin') renderFinancials();
  window.scrollTo(0, 0);
}

// ═══ COMMAND CENTER ═══
function renderCommand() {
  const stop = getCurrentStop();
  const fin = D.financials?.tour || D.financials || {};
  const earnings = fin.current_earnings || 0;
  const expenses = fin.total_expenses || 0;
  const net = fin.net_earnings || (earnings - expenses);
  const target = fin.target || 37000;
  const progress = target > 0 ? (net / target * 100) : 0;
  const groundOps = D.ground_ops || {};
  const opBank = groundOps.operational_bank || 0;

  // Stat cards
  const stopsDone = (D.tour_stops||[]).filter(s => s.status === 'Completed').length;
  const totalStops = (D.tour_stops||[]).length;
  document.getElementById('cmd-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Tour Net</div>
      <div class="stat-val fmt-money" style="color:${net>=0?'var(--st-booked)':'var(--expense)'}">${fmt$(net)}</div>
      <div class="stat-sub">of ${fmt$(target)} target</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${clamp(progress,0,100)}%;background:var(--cyan)"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Gross Earned</div>
      <div class="stat-val fmt-money">${fmt$(earnings)}</div>
      <div class="stat-sub">${fmtPct(progress)} to goal</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ground Float</div>
      <div class="stat-val fmt-money" style="color:var(--amber)">${fmt$(opBank)}</div>
      <div class="stat-sub">Adelaide ops</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Route</div>
      <div class="stat-val">${stopsDone}/${totalStops}</div>
      <div class="stat-sub">stops done</div>
    </div>
  `;

  // Current stop summary
  if (stop) {
    const bT = stop.targets?.busking || {};
    const bA = stop.actuals?.busking || {};
    const gT = stop.targets?.venue_gig || {};
    const gA = stop.actuals?.venue_gig || {};
    const hT = stop.targets?.house_concert || {};
    const hA = stop.actuals?.house_concert || {};

    document.getElementById('cmd-current-stop').innerHTML = `
      <div class="stop-detail-hdr">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="stop-detail-name">${stop.name}, ${stop.state}</div>
            <div class="stop-detail-meta">${stop.segment_type} · ${stop.est_duration_days} days · ${stop.transit_status}</div>
          </div>
          <span class="stop-badge current">Current</span>
        </div>
      </div>
      ${renderStreamMini('busking','🟢 Busking', bA.earnings_actual, bT.earnings_target, bA.sessions_completed, bT.sessions_target, 'sessions')}
      ${renderStreamMini('gig','🔵 Venue Gigs', gA.earnings_actual, gT.earnings_target, gA.gigs_played, gT.gigs_target, 'gigs')}
      ${renderStreamMini('house','🏠 House Concerts', hA.earnings_actual, hT.earnings_target, hA.shows_completed, hT.shows_target, 'shows')}
    `;
  } else {
    document.getElementById('cmd-current-stop').innerHTML = '<div class="empty-state">No active stop</div>';
  }

  // Priorities (computed from pipeline state)
  const priorities = computePriorities(stop);
  document.getElementById('cmd-priorities').innerHTML = priorities.length
    ? priorities.map(p => `
      <div class="priority-item">
        <span class="priority-icon">${p.icon}</span>
        <span class="priority-text">${p.text}</span>
        <span class="priority-tag" style="background:${p.color}22;color:${p.color}">${p.tag}</span>
      </div>`).join('')
    : '<div class="empty-state">All caught up 🎉</div>';

  // Quick todos
  const todos = (D.todos||[]).filter(t => !t.completed).slice(0,5);
  document.getElementById('cmd-todos').innerHTML = todos.length
    ? todos.map(t => renderTodoItem(t)).join('')
    : '<div class="empty-state">No pending tasks</div>';

  // Header
  document.getElementById('hdr-sub').textContent = stop ? `${stop.name} · ${stop.transit_status}` : 'Tour OS';
  document.getElementById('hdr-eta').textContent = `${fmtPct(progress)} to $37K`;
}

function renderStreamMini(streamType, label, actual, target, done, total, unit) {
  const pct = target > 0 ? (actual/target*100) : 0;
  const unitPct = total > 0 ? (done/total*100) : 0;
  return `
    <div class="stream-card" onclick="switchView('stop')" style="cursor:pointer">
      <div class="stream-icon ${streamType}">${streamType==='busking'?'🟢':streamType==='gig'?'🔵':'🏠'}</div>
      <div class="stream-body">
        <div style="display:flex;justify-content:space-between">
          <span class="stream-name">${label}</span>
          <span class="stream-amt">${fmt$(actual)} / ${fmt$(target)}</span>
        </div>
        <div class="stream-bar"><div class="stream-bar-fill ${streamType}" style="width:${clamp(pct,0,100)}%"></div></div>
        <div class="stream-amt" style="margin-top:0.25rem">${done}/${total} ${unit} · ${fmtPct(unitPct)}</div>
      </div>
    </div>`;
}

function computePriorities(stop) {
  const p = [];
  if (!stop) return p;
  const venues = getStopVenues(stop.id);
  const spots = getStopBuskingSpots(stop.id);
  const hcs = getStopHouseConcerts(stop.id);

  // Venues needing follow-up
  const needFollow = venues.filter(v => ['emailed','follow_up_1'].includes(v.pipeline_stage));
  needFollow.forEach(v => {
    p.push({icon:'📞', text:`Follow up with ${v.name} — ${STAGE_LABELS[v.pipeline_stage]||v.pipeline_stage}`, color:'#f59e0b', tag:'Gig'});
  });

  // Venues not contacted
  const notContacted = venues.filter(v => v.pipeline_stage === 'not_contacted');
  if (notContacted.length) {
    p.push({icon:'☎️', text:`Call ${notContacted[0].name} — ${notContacted[0].phone||'no phone'}`, color:'#3b82f6', tag:'Call'});
  }

  // House concerts needing seeding
  const hcPosted = hcs.filter(h => h.pipeline_stage === 'posted' || h.pipeline_stage === 'interested');
  if (hcPosted.length) {
    p.push({icon:'🏠', text:`Nudge ${hcPosted[0].host_name} — house concert ${hcPosted[0].pipeline_stage}`, color:'#f59e0b', tag:'House'});
  }

  // Busking spots spotted but not played
  const spotted = spots.filter(s => s.status === 'spotted' || s.status === 'confirmed');
  if (spotted.length) {
    p.push({icon:'🟢', text:`Play ${spotted[0].name} — scouted, ready to busk`, color:'#22c55e', tag:'Busk'});
  }

  // Marketing — reels to capture
  const bookedGigs = venues.filter(v => v.pipeline_stage === 'booked');
  if (bookedGigs.length) {
    const v = bookedGigs[0];
    if (!v.marketing?.reels_captured) {
      p.push({icon:'🎬', text:`Capture reels at ${v.name}`, color:'#a855f7', tag:'Content'});
    }
  }

  return p.slice(0, 5);
}

function renderTodoItem(t) {
  const cat = t.category || 'ops';
  return `
    <div class="todo-item" onclick="toggleTodo(${t.id})">
      <div class="todo-check ${t.completed?'done':''}"></div>
      <span class="todo-text ${t.completed?'done':''}">${t.task}</span>
      <span class="todo-badge ${cat}">${cat}</span>
    </div>`;
}

function toggleTodo(id) {
  const t = D.todos.find(t => t.id === id);
  if (t) { t.completed = !t.completed; saveEdits(); renderCommand(); }
}

// ═══ TOUR ROUTE ═══
function renderRoute() {
  const stops = D.tour_stops || [];
  document.getElementById('route-timeline').innerHTML = stops.map(s => {
    const bT = s.targets?.busking || {};
    const bA = s.actuals?.busking || {};
    const gT = s.targets?.venue_gig || {};
    const gA = s.actuals?.venue_gig || {};
    const hT = s.targets?.house_concert || {};
    const hA = s.actuals?.house_concert || {};

    const bPct = bT.earnings_target > 0 ? clamp(bA.earnings_actual/bT.earnings_target*100,0,100) : 0;
    const gPct = gT.earnings_target > 0 ? clamp(gA.earnings_actual/gT.earnings_target*100,0,100) : 0;
    const hPct = hT.earnings_target > 0 ? clamp(hA.earnings_actual/hT.earnings_target*100,0,100) : 0;

    const dotClass = s.status === 'Current' ? 'current' : s.status === 'Completed' ? 'completed' : s.status === 'Target' ? 'target' : 'planned';
    const badgeClass = s.status.toLowerCase();

    return `
      <div class="stop-node">
        <div class="stop-dot ${dotClass}"></div>
        <div class="stop-card" onclick="toggleStopExpand(${s.id})">
          <div class="stop-hdr">
            <div>
              <span class="stop-name">${s.name}</span>
              <span class="stop-num">#${s.id}</span>
            </div>
            <span class="stop-badge ${badgeClass}">${s.status}</span>
          </div>
          <div class="stop-meta">${s.state} · ${s.segment_type} · ${s.est_duration_days}d · ${s.transit_status}</div>
          <div class="stop-bars">

function nextStageLabel(stage) {
  const idx = VENUE_STAGES.indexOf(stage);
  if (idx < 0 || idx >= VENUE_STAGES.length - 1) return '—';
  return STAGE_LABELS[VENUE_STAGES[idx+1]] || 'Done';
}

function advanceVenue(venueId) {
  const v = D.venues.find(x => x.id === venueId);
  if (!v) return;
  const idx = VENUE_STAGES.indexOf(v.pipeline_stage);
  if (idx < 0 || idx >= VENUE_STAGES.length - 1) return;
  const next = VENUE_STAGES[idx+1];
  if (next === 'declined') return; // skip declined as auto-advance
  v.pipeline_stage = next;
  v.stage_history = v.stage_history || [];
  v.stage_history.push({stage: next, date: new Date().toISOString().slice(0,10), notes: 'Advanced via dashboard'});
  if (next === 'booked') v.status = 'booked';
  if (next === 'played') {
    v.status = 'played';
    // Auto-increment gig played count
    const stop = D.tour_stops.find(s => s.id === v.tour_stop_id);
    if (stop) stop.actuals.venue_gig.gigs_played = (stop.actuals.venue_gig.gigs_played||0) + 1;
  }
  saveEdits();
  renderStopDetail();
}

  }).join('');
  return html;

// ═══ PIPELINE VIEW ═══
function renderPipeline() {
  const stop = getCurrentStop();
  if (!stop) {
    document.getElementById('pipeline-container').innerHTML = '<div class="empty-state">No active stop</div>';
    return;
  }
  const venues = getStopVenues(stop.id);
  // Also show venues from next stop if current has few
  let allVenues = venues;
  if (venues.length < 3) {
    const nextStop = D.tour_stops?.find(s => s.id === stop.id + 1);
    if (nextStop) allVenues = [...venues, ...getStopVenues(nextStop.id)];
  }

  const stages = ['not_contacted','called','emailed','follow_up_1','follow_up_2','booked','played','declined'];
  let html = `<div class="filter-bar"><select onchange="renderPipelineFiltered(this.value)"><option value="all">All Stages</option><option value="not_contacted">Not Contacted</option><option value="called">Called</option><option value="emailed">Emailed</option><option value="follow_up_1">Follow Up 1</option><option value="follow_up_2">Follow Up 2</option><option value="booked">Booked</option><option value="played">Played</option><option value="declined">Declined</option></select></div><div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.8rem">Showing venues for ${stop.name}${allVenues.length>venues.length?' + next stop':''} — ${allVenues.length} total</div>`;

  const filteredStages = pipeFilterStage === 'all' ? stages : stages.filter(s => s === pipeFilterStage);
  filteredStages.forEach(stage => {
    const stageVenues = allVenues.filter(v => v.pipeline_stage === stage);
    if (!stageVenues.length) return;
    const color = STAGE_COLORS[stage];
    html += `
      <div class="pipe-group">
        <div class="pipe-group-title" style="color:${color}">
          <span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>
          ${STAGE_LABELS[stage]}
          <span class="pipe-count">${stageVenues.length}</span>
        </div>
        ${stageVenues.map(v => `
          <div class="entity-card venue-card stage-${stage}" onclick="openStopDetail(${v.tour_stop_id})">
            <div class="entity-hdr">
              <div>
                <div class="entity-name">${v.name}</div>
                <div class="entity-sub">${v.venue_type} · ${v.city}</div>
              </div>
            </div>
            ${v.phone ? `<div class="entity-row"><span class="lbl">📞</span><span><a href="tel:${v.phone}" style="color:var(--cyan)" onclick="event.stopPropagation()">${v.phone}</a></span></div>` : ''}
            ${v.contact_name ? `<div class="entity-row"><span class="lbl">Contact</span><span>${v.contact_name}</span></div>` : ''}
            ${v.gig?.date ? `<div class="entity-row"><span class="lbl">Gig Date</span><span style="color:var(--st-booked)">${v.gig.date}</span></div>` : ''}
            <div class="venue-actions" onclick="event.stopPropagation()">
              ${v.phone ? `<a href="tel:${v.phone}" class="venue-btn call">📞 Call</a>` : ''}
              <button class="venue-btn advance" onclick="advanceVenue('${v.id}')">→ ${nextStageLabel(stage)}</button>
            </div>
          </div>
        `).join('')}
      </div>`;
  });

  if (!allVenues.length) {
    html = '<div class="empty-state">No venues in pipeline. Add venues via the CLI or start calling!</div>';
  }

  document.getElementById('pipeline-container').innerHTML = html;
}

      ${(Object.entries(fin.expenses_by_category||{})).map(([cat, amt]) => `
        <div class="fin-row"><span class="lbl">${cat}</span><span>${fmt$(amt)}</span></div>
      `).join('')}
    </div>
  `;

  // Per-stop breakdown
  document.getElementById('fin-stops').innerHTML = (D.tour_stops||[]).map(s => {
    const proj = s.financials?.projected_income || 0;
    const actual = s.financials?.actual_income || 0;
    const net = s.financials?.net || 0;
    const pct = proj > 0 ? (actual/proj*100) : 0;
    return `
      <div class="fin-stop-row" onclick="openStopDetail(${s.id})" style="cursor:pointer">
        <div>
          <div style="font-weight:600">${s.name}</div>
          <div style="font-size:0.6rem;color:var(--text-faint)">${s.status}</div>
        </div>
        <div style="text-align:right">
          <div style="color:var(--off-white)">${fmt$(actual)} <span style="color:var(--text-faint);font-size:0.65rem">/ ${fmt$(proj)}</span></div>
          <div style="font-size:0.6rem;color:${net>=0?'var(--st-booked)':'var(--expense)'}">Net ${fmt$(net)}</div>
        </div>
      </div>`;
  }).join('');

  // Recent transactions
  const incTransactions = (D.income_history||[]).slice(-8).reverse();
  const expTransactions = (D.expense_history||[]).slice(-8).reverse();
  let txns = [
    ...incTransactions.map(i => ({date:i.date, desc:`${i.type} — ${i.location||''}`, amount:i.amount, type:'income'})),
    ...expTransactions.map(e => ({date:e.date, desc:`${e.category} — ${e.description||''}`, amount:e.amount, type:'expense'}))
  ].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,12);

  document.getElementById('fin-transactions').innerHTML = txns.length
    ? txns.map(t => `
      <div class="fin-stop-row">
        <div>
          <div style="font-weight:600">${t.desc}</div>
          <div style="font-size:0.6rem;color:var(--text-faint)">${t.date||''}</div>
        </div>
        <div style="font-weight:700;color:${t.type==='income'?'var(--st-booked)':'var(--expense)'}">${t.type==='income'?'+':'-'}${fmt$(t.amount)}</div>
      </div>`).join('')
    : '<div class="empty-state">No transactions logged yet</div>';
}

function submitQuickLog() {
  const stop = getCurrentStop();
  const today = new Date().toISOString().slice(0,10);

  if (qlType === 'busking') {
    const location = val('ql-location');
    const amount = parseFloat(val('ql-amount') || '0');
    const merch = parseFloat(val('ql-merch') || '0');
    const duration = parseInt(val('ql-duration') || '0');
    const notes = val('ql-notes');
    if (!location || !amount) { alert('Enter location and amount'); return; }

    // Route to ground_ops if Adelaide local busking
    const isLocal = location === 'Adelaide';
    D.income_history.push({id:`inc-${Date.now()}`,type:'busking',amount:amount+merch,location,date:today,notes});

    if (isLocal) {
      D.ground_ops.local_busking_earnings = (D.ground_ops.local_busking_earnings||0) + amount;
      D.ground_ops.operational_bank = (D.ground_ops.cash_float||0) + (D.ground_ops.local_busking_earnings||0) - (D.ground_ops.expenses||0);
    } else {
      // Update stop actuals
      const s = D.tour_stops.find(s => s.name === location);
      if (s) {
        s.actuals.busking.earnings_actual = (s.actuals.busking.earnings_actual||0) + amount;
        s.actuals.busking.sessions_completed = (s.actuals.busking.sessions_completed||0) + 1;
      }
    }
    saveEdits();

  } else if (qlType === 'gig') {
    const venue = val('ql-venue');
    const location = val('ql-location');
    const amount = parseFloat(val('ql-amount') || '0');
    const date = val('ql-date') || today;
    if (!venue || !amount) { alert('Enter venue and fee'); return; }
    D.income_history.push({id:`inc-${Date.now()}`,type:'venue_gig',amount,location:location||venue,date,venue_name:venue,notes:`Gig at ${venue}`});
    const s = D.tour_stops.find(s => s.name === location);
    if (s) {
      s.actuals.venue_gig.earnings_actual = (s.actuals.venue_gig.earnings_actual||0) + amount;
      s.actuals.venue_gig.gigs_played = (s.actuals.venue_gig.gigs_played||0) + 1;
    }
    saveEdits();

  } else if (qlType === 'expense') {
    const category = val('ql-category');
    const amount = parseFloat(val('ql-amount') || '0');
    const source = val('ql-source');
    const desc = val('ql-desc');
    if (!amount) { alert('Enter amount'); return; }
    D.expense_history.push({id:`exp-${Date.now()}`,category,amount,source,description:desc,date:today});
    if (source === 'local') {
      D.ground_ops.expenses = (D.ground_ops.expenses||0) + amount;
      D.ground_ops.operational_bank = (D.ground_ops.cash_float||0) + (D.ground_ops.local_busking_earnings||0) - (D.ground_ops.expenses||0);
    }
    saveEdits();

  } else if (qlType === 'spot') {
    const name = val('ql-spot-name');
    const location = val('ql-location');
    if (!name || !location) { alert('Enter spot name and city'); return; }
    const stopObj = D.tour_stops.find(s => s.name === location);
    const stopId = stopObj ? stopObj.id : 0;
    const spotId = `bsk-${location.toLowerCase().replace(/[^a-z]/g,'-')}-${name.toLowerCase().replace(/[^a-z]/g,'-')}`;
    const newSpot = {
      id: spotId, tour_stop_id: stopId,
      name, city: location,
      address: val('ql-address'),
      foot_traffic_rating: parseInt(val('ql-traffic')||'3'),
      permit_required: val('ql-permit') === 'true',
      permit_obtained: false,
      best_time_of_day: val('ql-besttime'),
      notes: val('ql-notes'),
      earnings_history: [],
      total_earnings_logged: 0,
      total_sessions: 0,
      avg_earnings_per_session: 0,
      status: 'spotted',
      discovered_date: today,
      tags: []
    };
    D.busking_spots = D.busking_spots || [];
    D.busking_spots.push(newSpot);
    if (stopObj) {
      stopObj.busking_spot_ids = stopObj.busking_spot_ids || [];
      stopObj.busking_spot_ids.push(spotId);
      stopObj.actuals.busking.spots_scouted = (stopObj.actuals.busking.spots_scouted||0) + 1;
    }
    saveEdits();
  }

  closeQuickLog();
  // Re-render current view
  const activeView = document.querySelector('.view.active')?.id?.replace('view-','');
  if (activeView) switchView(activeView);
}

  const el = document.getElementById(id);
  return el ? el.value : '';
}

function renderMktCheck(field, label, v, venueId) {
  const done = v.marketing?.[field];
  return `<div class="mkt-check ${done?'done':''}" onclick="toggleMarketing('${venueId}','${field}')">
    <div class="todo-check ${done?'done':''}"></div>
    <span class="todo-text">${label}</span>
  </div>`;
}

function toggleMarketing(venueId, field) {
  const v = D.venues.find(x => x.id === venueId);
  if (!v?.marketing) return;
  v.marketing[field] = !v.marketing[field];
  if (field === 'epk_sent' && v.marketing.epk_sent) v.marketing.epk_sent_date = new Date().toISOString().slice(0,10);
  saveEdits(); openVenueDetail(venueId);
}

function updateGigField(venueId, field, value) {
  const v = D.venues.find(x => x.id === venueId);
  if (!v?.gig) return;
  v.gig[field] = value;
  saveEdits();
}

function initGig(venueId) {
  const v = D.venues.find(x => x.id === venueId);
  if (!v) return;
  v.gig = { date:'', fee:400, set_times:[], set_duration_minutes:45, sound_check_time:'', stage_type:'small_stage', pa_provided:true, accommodation_offered:false, rider_notes:'', venue_notes:'' };
  saveEdits(); openVenueDetail(venueId);
}

function declineVenue(venueId) {
  const reason = prompt('Reason for declining?');
  if (reason === null) return;
  const v = D.venues.find(x => x.id === venueId);
  if (!v) return;
  v.pipeline_stage = 'declined';
  v.status = 'declined';
  v.stage_history = v.stage_history || [];
  v.stage_history.push({stage:'declined', date: new Date().toISOString().slice(0,10), notes:reason});
  saveEdits(); closeModal('vd-modal');
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

function venueNeedsFollowUp(v) {
  if (!v.stage_history?.length) return null;
  const last = v.stage_history[v.stage_history.length-1];
  const daysAgo = Math.floor((Date.now() - new Date(last.date)) / 86400000);
  if (v.pipeline_stage === 'emailed' && daysAgo >= 3) return `Follow up — emailed ${daysAgo} days ago`;
  if (v.pipeline_stage === 'follow_up_1' && daysAgo >= 5) return `Second follow-up — ${daysAgo} days since first`;
  if (v.pipeline_stage === 'follow_up_2' && daysAgo >= 14) return `May need to let go — ${daysAgo} days of silence`;
  return null;
}

// ── ADVANCE HOUSE CONCERT ──
function advanceHouseConcert(hcId) {
  const h = D.house_concerts.find(x => x.id === hcId);
  if (!h) return;
  const stages = ['posted','interested','confirmed','completed'];
  const idx = stages.indexOf(h.pipeline_stage);
  if (idx < 0 || idx >= stages.length - 1) return;
  h.pipeline_stage = stages[idx+1];
  h.status = stages[idx+1];
  h.stage_history = h.stage_history || [];
  h.stage_history.push({stage: h.pipeline_stage, date: new Date().toISOString().slice(0,10)});
  if (h.pipeline_stage === 'confirmed') {
    h.actuals.house_concert.shows_confirmed = (h.actuals?.house_concert?.shows_confirmed||0) + 1;
  }
  if (h.pipeline_stage === 'completed') {
    const stop = D.tour_stops.find(s => s.id === h.tour_stop_id);
    if (stop) stop.actuals.house_concert.shows_completed = (stop.actuals.house_concert.shows_completed||0) + 1;
  }
  saveEdits();
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

function cancelHouseConcert(hcId) {
  if (!confirm('Cancel this house concert?')) return;
  const h = D.house_concerts.find(x => x.id === hcId);
  if (!h) return;
  h.pipeline_stage = 'cancelled';
  h.status = 'cancelled';
  h.stage_history = h.stage_history || [];
  h.stage_history.push({stage:'cancelled', date: new Date().toISOString().slice(0,10), notes:'Cancelled via dashboard'});
  saveEdits();
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

// ── FB POSTING TRACKER ──
function toggleFBPost(hcId, group) {
  const h = D.house_concerts.find(x => x.id === hcId);
  if (!h) return;
  h.outreach = h.outreach || { posts: [], facebook_groups_posted: [], post_dates: [] };
  h.outreach.posts = h.outreach.posts || [];
  const existing = h.outreach.posts.find(p => p.group === group);
  const today = new Date().toISOString().slice(0,10);
  if (existing) {
    h.outreach.posts = h.outreach.posts.filter(p => p.group !== group);
  } else {
    h.outreach.posts.push({group, post_date: today, responses: 0, status: 'posted'});
  }
  h.outreach.facebook_groups_posted = h.outreach.posts.map(p => p.group);
  h.outreach.post_dates = h.outreach.posts.map(p => p.post_date);
  saveEdits();
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

// ── DELETE BUSKING SESSION ──
function deleteBuskingSession(spotId, sessionIdx) {
  if (!confirm('Delete this busking session?')) return;
  const spot = D.busking_spots.find(s => s.id === spotId);
  if (!spot?.earnings_history) return;
  const session = spot.earnings_history[sessionIdx];
  spot.earnings_history.splice(sessionIdx, 1);
  // Recalc aggregates
  spot.total_sessions = spot.earnings_history.length;
  spot.total_earnings_logged = spot.earnings_history.reduce((s,e) => s + (e.earnings||0), 0);
  spot.avg_earnings_per_session = spot.total_sessions > 0 ? spot.total_earnings_logged / spot.total_sessions : 0;
  // Recalc stop actuals
  const stop = D.tour_stops.find(s => s.id === spot.tour_stop_id);
  if (stop) {
    const spots = getStopBuskingSpots(stop.id);
    stop.actuals.busking.sessions_completed = spots.reduce((s,sp) => s + (sp.total_sessions||0), 0);
    stop.actuals.busking.earnings_actual = spots.reduce((s,sp) => s + (sp.total_earnings_logged||0), 0);
  }
  saveEdits();
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

// ── DELETE BUSKING SPOT ──
function deleteBuskingSpot(spotId) {
  if (!confirm('Delete this busking spot and all its sessions?')) return;
  const spot = D.busking_spots.find(s => s.id === spotId);
  if (!spot) return;
  const stop = D.tour_stops.find(s => s.id === spot.tour_stop_id);
  if (stop) {
    stop.busking_spot_ids = (stop.busking_spot_ids||[]).filter(id => id !== spotId);
    const spots = getStopBuskingSpots(stop.id);
    stop.actuals.busking.sessions_completed = spots.filter(s=>s.id!==spotId).reduce((s,sp) => s + (sp.total_sessions||0), 0);
    stop.actuals.busking.earnings_actual = spots.filter(s=>s.id!==spotId).reduce((s,sp) => s + (sp.total_earnings_logged||0), 0);
    stop.actuals.busking.spots_scouted = Math.max(0, (stop.actuals.busking.spots_scouted||0) - 1);
  }
  D.busking_spots = D.busking_spots.filter(s => s.id !== spotId);
  saveEdits();
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

// ── CYCLE SPOT STATUS ──
function cycleSpotStatus(spotId) {
  const spot = D.busking_spots.find(s => s.id === spotId);
  if (!spot) return;
  const cycle = ['spotted','confirmed','played','regular'];
  const idx = cycle.indexOf(spot.status || 'spotted');
  spot.status = cycle[(idx+1) % cycle.length];
  saveEdits();
  const av = document.querySelector('.view.active')?.id?.replace('view-','');
  if (av) switchView(av);
}

// ── STOP MANAGEMENT ──
function setCurrentStop(stopId) {
  D.tour_stops.forEach(s => {
    if (s.status === 'Current') s.status = 'Planned';
  });
  const stop = D.tour_stops.find(s => s.id === stopId);
  if (stop) { stop.status = 'Current'; stop.transit_status = 'Arrived'; }
  saveEdits();
  selectedStopId = stopId;
  switchView('command');
}

function moveStop(stopId, direction) {
  const stops = D.tour_stops;
  const idx = stops.findIndex(s => s.id === stopId);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= stops.length) return;
  const tmp = stops[idx];
  stops[idx] = stops[newIdx];
  stops[newIdx] = tmp;
  // Swap IDs to maintain order
  const tmpId = stops[idx].id;
  stops[idx].id = stops[newIdx].id;
  stops[newIdx].id = tmpId;
  saveEdits(); renderRoute();
}

function deleteStop(stopId) {
  const stop = D.tour_stops.find(s => s.id === stopId);
  if (!stop) return;
  if (stop.status === 'Current') { alert('Cannot delete current stop'); return; }
  if (!confirm(`Delete ${stop.name}? All venues, spots, and house concerts for this stop will be removed.`)) return;
  D.busking_spots = (D.busking_spots||[]).filter(s => s.tour_stop_id !== stopId);
  D.venues = (D.venues||[]).filter(v => v.tour_stop_id !== stopId);
  D.house_concerts = (D.house_concerts||[]).filter(h => h.tour_stop_id !== stopId);
  D.tour_stops = D.tour_stops.filter(s => s.id !== stopId);
  saveEdits(); renderRoute();
}

function openAddStopModal() { openModal('as-modal'); }

function submitAddStop() {
  const name = val('as-name');
  const state = val('as-state');
  if (!name) { alert('Enter stop name'); return; }
  const newId = Math.max(...D.tour_stops.map(s => s.id), 0) + 1;
  const stop = {
    id: newId, name, state, segment_type: val('as-segment'),
    est_duration_days: parseInt(val('as-days')||'3'), arrival_date: '', departure_date: '',
    status: 'Planned', transit_status: 'Scheduled', week_type: 'regional', notes: '',
    targets: { busking:{sessions_target:parseInt(val('as-busk')||'2'),spots_scouted_target:1,spots_confirmed_target:1,earnings_target:600},
               venue_gig:{gigs_target:parseInt(val('as-gig')||'1'),venues_contacted_target:3,gigs_booked_target:1,earnings_target:400},
               house_concert:{shows_target:1,hosts_contacted_target:2,shows_confirmed_target:1,earnings_target:500} },
    actuals: { busking:{sessions_completed:0,spots_scouted:0,spots_confirmed:0,earnings_actual:0},
               venue_gig:{gigs_booked:0,venues_contacted:0,gigs_played:0,earnings_actual:0},
               house_concert:{shows_confirmed:0,hosts_contacted:0,shows_completed:0,earnings_actual:0} },
    financials: {projected_income:1500,actual_income:0,actual_expenses:0,net:0},
    busking_spot_ids: [], venue_ids: [], house_concert_ids: [], marketing_id: null
  };
  D.tour_stops.push(stop);
  saveEdits(); closeModal('as-modal'); renderRoute();
}

// ── ADD STOP BUTTON IN ROUTE VIEW ──
function renderAddStopButton() {
  return `<button class="venue-btn" style="width:100%;margin-top:0.5rem" onclick="openAddStopModal()">+ Add Tour Stop</button>`;
}


function nextHCStageLabel(stage) {
  const stages = ['posted','interested','confirmed','completed'];
  const idx = stages.indexOf(stage);
  if (idx < 0 || idx >= stages.length-1) return '—';
  const labels = {interested:'Interested', confirmed:'Confirm', completed:'Complete'};
  return labels[stages[idx+1]] || '—';
}

function renderFBTracker(h) {
  const groups = D.config?.facebook_groups || [];
  const posts = h.outreach?.posts || [];
  return `<div class="fb-tracker"><div class="section-title" style="margin:0.4rem 0">Facebook Group Posts</div>${groups.map(g => {
    const post = posts.find(p => p.group === g);
    return `<div class="fb-tracker-row" onclick="toggleFBPost('${h.id}','${g}')">
      <div class="todo-check ${post?'done':''}"></div>
      <span class="fb-group-name">${g}</span>
      ${post?`<span class="fb-post-date">${post.post_date}</span><span class="fb-resp-count">${post.responses||0} resp</span>`:''}
    </div>`;
  }).join('')}</div>`;
}

  'Budget constraints',
  'Not interested in live music',
  'Venue closing/renovating',
  'No response after 3+ follow-ups',
  'Other'
];

/* ── Normalize: v2 venue → v3 venue ── */
function normalizeVenue(v) {
  var rawStage = v.stage || v.pipeline_stage || 'not_contacted';
  var stage = VENUE_STAGE_MAP[rawStage] || rawStage;
  
  // Normalize marketing fields (v2 → v3)
  var mkt = v.marketing || {};
  var marketing = {
    epk_sent:           !!(mkt.epk_sent),
    epk_sent_date:      mkt.epk_sent_date || null,
    media_pack_sent:    !!(mkt.media_pack_sent),
    media_pack_sent_date: mkt.media_pack_sent_date || null,
    tcs_sent:           !!(mkt.tcs_sent),
    tcs_sent_date:      mkt.tcs_sent_date || null,
    reels_captured:     !!(mkt.reels_captured),
    venue_tagged:       !!(mkt.venue_tagged || mkt.venue_tagged_dylan),
    content_notes:      mkt.content_notes || ''
  };
  
  // Normalize stage_history
  var stageHistory = (v.stage_history || []).map(function(sh) {
    return {
      stage: VENUE_STAGE_MAP[sh.stage] || sh.stage,
      date: sh.date || '',
      notes: sh.notes || ''
    };
  });
  
  // Normalize gig
  var gig = v.gig ? {
    date: v.gig.date || '',
    fee: v.gig.fee || 0,
    set_times: v.gig.set_times || [],
    set_duration_minutes: v.gig.set_duration_minutes || 45,
    sound_check: v.gig.sound_check_time || v.gig.sound_check || '',
    pa_provided: v.gig.pa_provided !== undefined ? v.gig.pa_provided : true,
    rider: v.gig.rider_notes || v.gig.rider || '',
    accommodation_offered: v.gig.accommodation_offered || false
  } : null;
  
  return {
    id: v.id,
    name: v.name || '',
    phone: v.phone || '',
    email: v.email || '',
    contact_name: v.contact_name || '',
    contact_id: v.contact_id || '',
    type: v.venue_type || v.type || '',
    city: v.city || '',
    state: v.state || '',
    priority: v.priority || 'medium',
    tour_stop_id: v.tour_stop_id,
    stage: stage,
    stage_history: stageHistory,
    follow_up_count: v.follow_up_count || 0,
    first_contacted_date: v.first_contacted_date || null,
    gig: gig,
    marketing: marketing,
    decline_reason: v.decline_reason || null,
    tags: v.tags || [],
    status: v.status || 'active',
    _raw: v  // keep reference to original for saving
  };
}

/* ── Normalize: v2 HC → v3 HC ── */
function normalizeHC(h) {
  var rawStage = h.stage || h.pipeline_stage || 'posted';
  // HC stages already match v3, but handle edge cases
  var stage = rawStage;
  
  var mkt = h.marketing || {};
  var marketing = {
    promo_kit_sent:        !!(mkt.promo_kit_sent),
    promo_kit_sent_date:   mkt.promo_kit_sent_date || null,
    invite_generated:      !!(mkt.invite_generated),
    invite_url:            mkt.invite_url || null,
    host_posted_socials:   !!(mkt.host_posted_socials),
    reels_captured:        !!(mkt.reels_captured),
    content_notes:         mkt.content_notes || ''
  };
  
  var stageHistory = (h.stage_history || []).map(function(sh) {
    return {
      stage: sh.stage,
      date: sh.date || '',
      notes: sh.notes || ''
    };
  });
  
  var event = h.event ? {
    date: h.event.date || '',
    tier: h.event.tier || 'tier_2',
    tickets_sold: h.event.tickets_sold || 0,
    tickets_target: h.event.tickets_target || 0,
    revenue_actual: h.event.revenue_actual || 0,
    revenue_projected: h.event.revenue_projected || 0,
    humanitix_link: h.event.humanitix_link || '',
    door_time: h.event.door_time || '',
    start_time: h.event.start_time || ''
  } : null;
  
  return {
    id: h.id,
    host_name: h.host_name || '',
    host_phone: h.host_phone || '',
    host_email: h.host_email || '',
    host_contact_id: h.host_contact_id || '',
    source: h.source || '',
    source_detail: h.source_detail || '',
    tour_stop_id: h.tour_stop_id,
    stage: stage,
    stage_history: stageHistory,
    event: event,
    marketing: marketing,
    tags: h.tags || [],
    status: h.status || 'active',
    _raw: h
  };
}

/* ── V3 Data API (wraps existing D global) ── */
function v3_getAllEntities(type) {
  if (type === 'venues') return (D.venues || []).map(normalizeVenue);
  if (type === 'house_concerts') return (D.house_concerts || []).map(normalizeHC);
  return [];
}

function v3_getEntity(type, id) {
  var arr = type === 'venues' ? D.venues : (type === 'house_concerts' ? D.house_concerts : []);
  var raw = arr.find(function(e) { return e.id === id; });
  if (!raw) return null;
  return type === 'venues' ? normalizeVenue(raw) : normalizeHC(raw);
}

function v3_getRawEntity(type, id) {
  var arr = type === 'venues' ? D.venues : (type === 'house_concerts' ? D.house_concerts : []);
  return arr.find(function(e) { return e.id === id; });
}

function v3_updateEntity(type, id, data) {
  var raw = v3_getRawEntity(type, id);
  if (!raw) return;
  // Merge data into raw object
  Object.keys(data).forEach(function(k) {
    if (k === '_raw' || k === 'stage' || k === 'stage_history') return;
    raw[k] = data[k];
  });
  // Handle stage updates specially
  if (data.stage) {
    raw.stage = data.stage;
    raw.pipeline_stage = data.stage; // keep v2 compat
    raw.status = data.stage;
  }
  if (data.stage_history) {
    raw.stage_history = data.stage_history;
  }
  if (data.marketing) {
    raw.marketing = raw.marketing || {};
    Object.keys(data.marketing).forEach(function(k) {
      raw.marketing[k] = data.marketing[k];
    });
  }
  if (data.gig) {
    raw.gig = data.gig;
  }
  if (data.event) {
    raw.event = data.event;
  }
  raw.updated_at = new Date().toISOString();
  saveEdits();
}

function v3_advancePipeline(type, id, newStage, notes) {
  var raw = v3_getRawEntity(type, id);
  if (!raw) return;
  var now = new Date().toISOString();
  var today = now.slice(0, 10);
  
  // Get current stage (normalized)
  var currentStage;
  if (type === 'venues') {
    var norm = normalizeVenue(raw);
    currentStage = norm.stage;
  } else {
    currentStage = raw.stage || raw.pipeline_stage || 'posted';
  }
  
  // Update stage
  raw.stage = newStage;
  raw.pipeline_stage = newStage; // v2 compat
  raw.status = newStage;
  
  // Log to stage_history
  raw.stage_history = raw.stage_history || [];
  raw.stage_history.push({
    stage: newStage,
    date: today,
    timestamp: now,
    notes: notes || ''
  });
  
  // Handle follow_up count increment
  if (type === 'venues' && newStage === 'follow_up' && currentStage === 'follow_up') {
    raw.follow_up_count = (raw.follow_up_count || 0) + 1;
  }
  
  // Handle first_contacted_date
  if (type === 'venues' && !raw.first_contacted_date && (newStage === 'contacted' || newStage === 'called' || newStage === 'emailed')) {
    raw.first_contacted_date = today;
  }
  
  // Handle decline_reason
  if (newStage === 'declined' && notes) {
    raw.decline_reason = notes;
  }
  
  // Handle confirmed venue → init gig if missing
  if (type === 'venues' && newStage === 'booked' && !raw.gig) {
    raw.gig = {
      date: '', fee: 400, set_times: [], set_duration_minutes: 45,
      sound_check_time: '', pa_provided: true, rider_notes: '', venue_notes: ''
    };
  }
  
  // Handle HC confirmed → init event if missing
  if (type === 'house_concerts' && newStage === 'confirmed' && !raw.event) {
    var stop = (D.tour_stops || []).find(function(s) { return s.id === raw.tour_stop_id; });
    raw.event = {
      date: stop ? (stop.arrival_date || '') : '',
      tier: 'tier_2',
      tickets_sold: 0,
      tickets_target: 30,
      revenue_projected: 750,
      revenue_actual: 0,
      humanitix_link: ''
    };
  }
  
  raw.updated_at = new Date().toISOString();
  saveEdits();
}

function v3_getValidTransitions(type, stage) {
  var transitions = type === 'venues' ? VENUE_TRANSITIONS : HC_TRANSITIONS;
  return transitions[stage] || [];
}

function v3_archiveEntity(type, id) {
  var raw = v3_getRawEntity(type, id);
  if (!raw) return;
  raw.status = 'archived';
  raw.updated_at = new Date().toISOString();
  saveEdits();
}

function v3_deleteEntity(type, id) {
  if (type === 'venues') {
    D.venues = (D.venues || []).filter(function(v) { return v.id !== id; });
  } else if (type === 'house_concerts') {
    D.house_concerts = (D.house_concerts || []).filter(function(h) { return h.id !== id; });
  }
  // Also remove from tour_stop arrays
  (D.tour_stops || []).forEach(function(stop) {
    if (type === 'venues' && stop.venue_ids) {
      stop.venue_ids = stop.venue_ids.filter(function(vid) { return vid !== id; });
    }
    if (type === 'house_concerts' && stop.house_concert_ids) {
      stop.house_concert_ids = stop.house_concert_ids.filter(function(hid) { return hid !== id; });
    }
  });
  saveEdits();
}

/* ═══════════════════════════════════════════════════════════════
   SECTION 1: PIPELINE STATE
   ═══════════════════════════════════════════════════════════════ */

var pipeState = {
  mode: 'venues',          // 'venues' | 'house_concerts'
  filterStage: 'all',      // 'all' or a specific stage
  searchTerm: '',
  showAllStops: false,     // false = current stop only
  editMode: false          // for detail modal edit toggle
};

/* ═══════════════════════════════════════════════════════════════
   SECTION 2: MAIN RENDER — overrides existing renderPipeline()
   ═══════════════════════════════════════════════════════════════ */

window.renderPipeline = function() {
  var container = document.getElementById('pipeline-container');
  if (!container) return;
  
  var stop = getCurrentStop();
  
  // ── Segmented control ──
  var html = '';
  html += '<div class="seg-control">';
  html += '<button class="seg-btn ' + (pipeState.mode === 'venues' ? 'active' : '') + '" onclick="V3Pipe.setMode(\'venues\')">🏢 Venues</button>';
  html += '<button class="seg-btn ' + (pipeState.mode === 'house_concerts' ? 'active' : '') + '" onclick="V3Pipe.setMode(\'house_concerts\')">🏠 House Concerts</button>';
  html += '</div>';
  
  // ── Filter bar ──
  html += renderFilterBar();
  
  // ── Scope label ──
  var allEntities = getScopedEntities();
  var scopeLabel = pipeState.showAllStops ? 'All stops' : (stop ? stop.name : 'No active stop');
  html += '<div class="pipe-scope-label">' + scopeLabel + ' — ' + allEntities.length + ' total</div>';
  
  // ── Render pipeline groups ──
  if (pipeState.mode === 'venues') {
    html += renderVenuePipeline(allEntities);
  } else {
    html += renderHCPipeline(allEntities);
  }
  
  if (!allEntities.length) {
    var emptyMsg = pipeState.mode === 'venues' 
      ? 'No venues in pipeline. Tap + to add a venue.'
      : 'No house concerts yet. Tap + to add a host.';
    html = html.replace(/<div class="pipe-scope-label">.*<\/div>/, '');
    html += '<div class="empty-state">' + emptyMsg + '</div>';
  }
  
  container.innerHTML = html;
};

/* ── Scoped entities (current stop or all) ── */
function getScopedEntities() {
  var stop = getCurrentStop();
  var type = pipeState.mode;
  
  var entities;
  if (pipeState.showAllStops) {
    entities = v3_getAllEntities(type);
  } else {
    if (!stop) return [];
    entities = v3_getAllEntities(type).filter(function(e) {
      return e.tour_stop_id === stop.id;
    });
    // If current stop has few, also show next stop
    if (entities.length < 3) {
      var stopIdx = (D.tour_stops || []).findIndex(function(s) { return s.id === stop.id; });
      if (stopIdx >= 0 && stopIdx < D.tour_stops.length - 1) {
        var nextStop = D.tour_stops[stopIdx + 1];
        var nextEntities = v3_getAllEntities(type).filter(function(e) {
          return e.tour_stop_id === nextStop.id;
        });
        entities = entities.concat(nextEntities);
      }
    }
  }
  
  // Apply search filter
  var searchLower = (pipeState.searchTerm || '').toLowerCase();
  if (searchLower) {
    entities = entities.filter(function(e) {
      var name = (pipeState.mode === 'venues' ? e.name : e.host_name) || '';
      var city = e.city || '';
      var contact = e.contact_name || e.host_name || '';
      return name.toLowerCase().indexOf(searchLower) !== -1 ||
             city.toLowerCase().indexOf(searchLower) !== -1 ||
             contact.toLowerCase().indexOf(searchLower) !== -1;
    });
  }
  
  return entities;
}

/* ── Filter bar ── */
function renderFilterBar() {
  var stages = pipeState.mode === 'venues' ? VENUE_STAGES_V3.concat(VENUE_TERMINAL) : HC_STAGES_V3.concat(HC_TERMINAL);
  var labels = pipeState.mode === 'venues' ? VENUE_STAGE_LABELS : HC_STAGE_LABELS;
  
  var html = '<div class="filter-bar">';
  html += '<select onchange="V3Pipe.setFilterStage(this.value)">';
  html += '<option value="all"' + (pipeState.filterStage === 'all' ? ' selected' : '') + '>All Stages</option>';
  stages.forEach(function(s) {
    html += '<option value="' + s + '"' + (pipeState.filterStage === s ? ' selected' : '') + '>' + labels[s] + '</option>';
  });
  html += '</select>';
  html += '<input type="text" placeholder="🔍 Search…" value="' + escAttr(pipeState.searchTerm) + '" oninput="V3Pipe.setSearch(this.value)">';
  html += '<label class="pipe-toggle"><input type="checkbox" ' + (pipeState.showAllStops ? 'checked' : '') + ' onchange="V3Pipe.setShowAll(this.checked)"> All stops</label>';
  html += '</div>';
  
  return html;
}

/* ═══════════════════════════════════════════════════════════════
   SECTION 3: VENUE PIPELINE
   ═══════════════════════════════════════════════════════════════ */

function renderVenuePipeline(entities) {
  var html = '';
  var stagesToShow = pipeState.filterStage === 'all' 
    ? VENUE_STAGES_V3 
    : [pipeState.filterStage];
  
  // Main stages
  stagesToShow.forEach(function(stage) {
    var stageVenues = entities.filter(function(v) { return v.stage === stage; });
    if (!stageVenues.length) return;
    html += renderVenueStageGroup(stage, stageVenues);
  });
  
  // Terminal stages (collapsible)
  if (pipeState.filterStage === 'all' || VENUE_TERMINAL.indexOf(pipeState.filterStage) !== -1) {
    VENUE_TERMINAL.forEach(function(stage) {
      if (pipeState.filterStage !== 'all' && pipeState.filterStage !== stage) return;
      var stageVenues = entities.filter(function(v) { return v.stage === stage; });
      if (!stageVenues.length) return;
      html += renderVenueTerminalGroup(stage, stageVenues);
    });
  }
  
  return html;
}

function renderVenueStageGroup(stage, venues) {
  var color = VENUE_STAGE_COLORS[stage] || '#888';
  var label = VENUE_STAGE_LABELS[stage] || stage;
  
  var html = '<div class="pipe-group">';
  html += '<div class="pipe-group-title" style="color:' + color + '">';
  html += '<span style="width:8px;height:8px;border-radius:50%;background:' + color + ';display:inline-block"></span>';
  html += label;
  html += '<span class="pipe-count">' + venues.length + '</span>';
  html += '</div>';
  
  venues.forEach(function(v) {
    html += renderVenueCard(v);
  });
  
  html += '</div>';
  return html;
}

function renderVenueTerminalGroup(stage, venues) {
  var color = VENUE_STAGE_COLORS[stage] || '#888';
  var label = VENUE_STAGE_LABELS[stage] || stage;
  var groupId = 'venue-terminal-' + stage;
  
  var html = '<div class="pipe-group pipe-terminal">';
  html += '<div class="pipe-group-title collapsible" style="color:' + color + ';cursor:pointer" onclick="V3Pipe.toggleCollapse(\'' + groupId + '\')">';
  html += '<span style="width:8px;height:8px;border-radius:50%;background:' + color + ';display:inline-block"></span>';
  html += label;
  html += '<span class="pipe-count">' + venues.length + '</span>';
  html += '<span class="collapse-icon" id="' + groupId + '-icon">▼</span>';
  html += '</div>';
  html += '<div class="pipe-terminal-body" id="' + groupId + '" style="display:none">';
  venues.forEach(function(v) {
    html += renderVenueCard(v);
  });
  html += '</div>';
  html += '</div>';
  return html;
}

function renderVenueCard(v) {
  var color = VENUE_STAGE_COLORS[v.stage] || '#888';
  var prioColor, prioBg, prioText;
  if (v.priority === 'high') { prioColor = '#ef4444'; prioBg = 'rgba(239,68,68,0.15)'; prioText = 'HIGH'; }
  else if (v.priority === 'low') { prioColor = '#9ca3af'; prioBg = 'rgba(156,163,175,0.12)'; prioText = 'LOW'; }
  else { prioColor = '#f59e0b'; prioBg = 'rgba(245,158,11,0.15)'; prioText = 'MED'; }
  
  var vid = v.id.replace(/'/g, "\\'");
  
  var html = '<div class="venue-card v3-venue-card" style="border-left:3px solid ' + color + '" onclick="V3Pipe.openVenueDetail(\'' + vid + '\')">';
  html += '<div class="entity-hdr">';
  html += '<div>';
  html += '<div class="entity-name">' + escHtml(v.name) + ' <span class="venue-stage-badge" style="background:' + prioBg + ';color:' + prioColor + '">' + prioText + '</span></div>';
  html += '<div class="entity-sub">' + escHtml(v.type) + ' · ' + escHtml(v.city) + '</div>';
  html += '</div>';
  html += '<span class="venue-stage-badge" style="background:' + color + '22;color:' + color + '">' + VENUE_STAGE_LABELS[v.stage] + '</span>';
  html += '</div>';
  
  if (v.contact_name) {
    html += '<div class="entity-row"><span class="lbl">Contact</span><span>' + escHtml(v.contact_name) + '</span></div>';
  }
  if (v.phone) {
    html += '<div class="entity-row"><span class="lbl">📞</span><a href="tel:' + encodeURIComponent(v.phone) + '" style="color:var(--cyan)" onclick="event.stopPropagation()">' + escHtml(v.phone) + '</a></div>';
  }
  if (v.gig && v.gig.date) {
    html += '<div class="entity-row"><span class="lbl">Gig Date</span><span style="color:var(--st-booked)">' + v.gig.date + '</span></div>';
  }
  
  // Follow-up count badge
  if (v.stage === 'follow_up' && v.follow_up_count > 0) {
    html += '<div class="followup-alert">Follow-up #' + v.follow_up_count + '</div>';
  }
  
  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════════════════════════
   SECTION 4: HOUSE CONCERT PIPELINE
   ═══════════════════════════════════════════════════════════════ */

function renderHCPipeline(entities) {
  var html = '';
  var stagesToShow = pipeState.filterStage === 'all' 
    ? HC_STAGES_V3 
    : [pipeState.filterStage];
  
  // Main stages
  stagesToShow.forEach(function(stage) {
    var stageHCs = entities.filter(function(h) { return h.stage === stage; });
    if (!stageHCs.length) return;
    html += renderHCStageGroup(stage, stageHCs);
  });
  
  // Terminal (cancelled) — collapsible
  if (pipeState.filterStage === 'all' || pipeState.filterStage === 'cancelled') {
    var cancelledHCs = entities.filter(function(h) { return h.stage === 'cancelled'; });
    if (cancelledHCs.length) {
      html += renderHCTerminalGroup('cancelled', cancelledHCs);
    }
  }
  
  return html;
}

function renderHCStageGroup(stage, hcs) {

  var label = HC_STAGE_LABELS[stage] || stage;
  
  var html = '<div class="pipe-group">';
  html += '<div class="pipe-group-title" style="color:' + color + '">';
  html += '<span style="width:8px;height:8px;border-radius:50%;background:' + color + ';display:inline-block"></span>';
  html += label;
  html += '<span class="pipe-count">' + hcs.length + '</span>';
  html += '</div>';
  
  hcs.forEach(function(h) {
    html += renderHCCard(h);
  });
  
  html += '</div>';
  return html;
}

function renderHCTerminalGroup(stage, hcs) {
  var color = HC_STAGE_COLORS[stage] || '#888';
  var label = HC_STAGE_LABELS[stage] || stage;
  var groupId = 'hc-terminal-' + stage;
  
  var html = '<div class="pipe-group pipe-terminal">';
  html += '<div class="pipe-group-title collapsible" style="color:' + color + ';cursor:pointer" onclick="V3Pipe.toggleCollapse(\'' + groupId + '\')">';
  html += '<span style="width:8px;height:8px;border-radius:50%;background:' + color + ';display:inline-block"></span>';
  html += label;
  html += '<span class="pipe-count">' + hcs.length + '</span>';
  html += '<span class="collapse-icon" id="' + groupId + '-icon">▼</span>';
  html += '</div>';
  html += '<div class="pipe-terminal-body" id="' + groupId + '" style="display:none">';
  hcs.forEach(function(h) {
    html += renderHCCard(h);
  });
  html += '</div>';
  html += '</div>';
  return html;
}

function renderHCCard(h) {
  var color = HC_STAGE_COLORS[h.stage] || '#888';
  var hid = h.id.replace(/'/g, "\\'");
  
  var html = '<div class="venue-card v3-hc-card" style="border-left:3px solid ' + color + '" onclick="V3Pipe.openHCDetail(\'' + hid + '\')">';

  html += '<div class="entity-sub">' + escHtml(h.source) + '</div>';
  html += '</div>';
  html += '<span class="venue-stage-badge" style="background:' + color + '22;color:' + color + '">' + HC_STAGE_LABELS[h.stage] + '</span>';
  html += '</div>';

    html += '<div class="entity-row"><span class="lbl">Event Date</span><span style="color:var(--house-l)">' + h.event.date + '</span></div>';
  }
  if (h.source_detail) {
    html += '<div class="entity-row"><span class="lbl">Detail</span><span>' + escHtml(h.source_detail) + '</span></div>';

function renderVenueStageAdvancement(v, vid) {
  var transitions = v3_getValidTransitions('venues', v.stage);
  if (!transitions.length) {
    return '<div class="section-title" style="margin:0.6rem 0 0.4rem">Stage Advancement</div><div class="empty-state" style="padding:0.5rem">No further stages (terminal)</div>';
  }
  
  var html = '<div class="section-title" style="margin:0.6rem 0 0.4rem">Stage Advancement</div>';
  html += '<div class="venue-actions">';
  
  transitions.forEach(function(newStage) {
    var label = VENUE_STAGE_LABELS[newStage] || newStage;
    var isDecline = newStage === 'declined';
    var isCancel = newStage === 'cancelled';
    var isReengage = newStage === 'not_contacted' && (v.stage === 'declined' || v.stage === 'cancelled');
    var isFollowUp = newStage === 'follow_up' && v.stage === 'follow_up';
    
    var btnColor = isDecline || isCancel ? 'var(--expense)' : 'var(--st-booked)';
    var btnBorder = isDecline || isCancel ? 'rgba(239,68,68,0.3)' : 'rgba(34,197,94,0.3)';
    var btnLabel = label;
    if (isReengage) btnLabel = '🔄 Re-engage';
    if (isFollowUp) btnLabel = 'Follow Up → (count: ' + (v.follow_up_count + 1) + ')';
    
    var action = 'V3Pipe.advanceVenueStage(\'' + vid + '\',\'' + newStage + '\')';
    if (isDecline) action = 'V3Pipe.showDeclinePicker(\'' + vid + '\')';
    
    html += '<button class="venue-btn advance" style="color:' + btnColor + ';border-color:' + btnBorder + ';flex:1" onclick="' + action + '">→ ' + btnLabel + '</button>';
  });
  
  html += '</div>';
  return html;
}

function renderStageHistory(history, labels) {
  if (!history || !history.length) {
    return '<div class="section-title" style="margin:0.6rem 0 0.4rem">Stage History</div><div class="empty-state" style="padding:0.5rem">No history</div>';
  }
  
  var html = '<div class="section-title" style="margin:0.6rem 0 0.4rem">Stage History</div>';
  html += '<div class="stage-timeline">';
  history.forEach(function(sh, idx) {
    var label = labels[sh.stage] || sh.stage;
    html += '<div class="stage-tl-item">' + label + ' — ' + sh.date + (sh.notes ? ' (' + sh.notes + ')' : '') + '</div>';
  });
  html += '</div>';
  return html;
}

var mediaPackComponents = {
  epk:        { label: 'EPK Link',        included: true },
  bio:        { label: 'Bio',             included: true },
  quotes:     { label: 'Press Quotes',    included: true },
  photos:     { label: 'Photos',          included: true },
  videos:     { label: 'Videos',           included: true },
  tech:       { label: 'Tech Requirements', included: true },
  availability: { label: 'Availability',  included: true },
  tcs:        { label: 'T&Cs',            included: true }
};

window.V3Pipe_openMediaPack = function(type, entityId) {
  var entity, recipientName, recipientEmail, venueName, gigDate, fee;
  
  if (type === 'venues') {
    entity = v3_getEntity('venues', entityId);
    if (!entity) return;
    recipientName = entity.contact_name || entity.name;
    recipientEmail = entity.email || '';
    venueName = entity.name;
    gigDate = entity.gig ? entity.gig.date : '';
    fee = entity.gig ? entity.gig.fee : 400;
  } else {
    entity = v3_getEntity('house_concerts', entityId);
    if (!entity) return;
    recipientName = entity.host_name;
    recipientEmail = entity.host_email || '';
    venueName = entity.host_name + ' (House Concert)';
    gigDate = entity.event ? entity.event.date : '';
    fee = entity.event ? (entity.event.revenue_projected || 700) : 700;
  }
  
  // Store context for sending
  pipeState._mediaPackContext = { type: type, entityId: entityId, entity: entity };
  
  var html = '';
  html += '<div class="modal-hdr">';
  html += '<div class="modal-title">📦 Media Pack Composer</div>';
  html += '<button class="modal-close" onclick="closeModal(\'mp-modal\')">✕</button>';
  html += '</div>';
  
  // Recipient
  html += '<div class="entity-row"><span class="lbl">To</span><span>' + escHtml(recipientName) + (recipientEmail ? ' &lt;' + escHtml(recipientEmail) + '&gt;' : ' (no email)') + '</span></div>';
  
  // Components
  html += '<div class="section-title" style="margin:0.6rem 0 0.4rem">Components</div>';
  Object.keys(mediaPackComponents).forEach(function(key) {
    var comp = mediaPackComponents[key];
    html += '<div class="mkt-check ' + (comp.included ? '' : '') + '" onclick="V3Pipe.toggleMediaComp(\'' + key + '\')">';
    html += '<div class="todo-check ' + (comp.included ? 'done' : '') + '"></div>';
    html += '<span class="todo-text">' + comp.label + '</span>';
    html += '</div>';
  });
  
  // Delivery options
  html += '<div class="section-title" style="margin:0.6rem 0 0.4rem">Delivery</div>';
  html += '<div class="venue-actions">';
  html += '<button class="venue-btn advance" style="flex:1" onclick="V3Pipe.sendMediaPack(\'email\')">📧 Email (mailto:)</button>';
  html += '<button class="venue-btn" style="flex:1;color:var(--cyan);border-color:rgba(0,210,255,0.3)" onclick="V3Pipe.sendMediaPack(\'clipboard\')">📋 Copy to Clipboard</button>';
  html += '</div>';
  
  // Preview
  html += '<div class="section-title" style="margin:0.6rem 0 0.4rem">Preview</div>';
  html += '<div id="mp-preview" style="background:rgba(0,0,0,0.3);border-radius:8px;padding:0.6rem;font-size:0.7rem;white-space:pre-wrap;max-height:200px;overflow-y:auto">' + escHtml(buildMediaPackText(entity, type)) + '</div>';
  
  var sheet = ensureModalSheet('mp-modal');
  sheet.innerHTML = html;
  openModal('mp-modal');
};

function buildMediaPackText(entity, type) {
  var artistName = (D.meta && D.meta.artist && D.meta.artist.name) || 'Dylan Crowe';
  var artistEmail = (D.meta && D.meta.artist && D.meta.artist.email) || 'dylancrowemusic@gmail.com';
  var artistIG = (D.meta && D.meta.artist && D.meta.artist.ig) || '@dylan_crowe_music';
  var venueName, gigDate, fee;
  
  if (type === 'venues') {
    venueName = entity.name;
    gigDate = entity.gig ? entity.gig.date : '';
    fee = entity.gig ? entity.gig.fee : 400;
  } else {
    venueName = entity.host_name + ' (House Concert)';
    gigDate = entity.event ? entity.event.date : '';
    fee = entity.event ? (entity.event.revenue_projected || 700) : 700;
  }
  
  var subject = 'Dylan Crowe — Media Pack & T&Cs for ' + venueName;
  var lines = [];
  lines.push('Subject: ' + subject);
  lines.push('');
  lines.push('Hi ' + (entity.contact_name || entity.host_name || 'there') + ',');
  lines.push('');
  lines.push('Thanks for your interest in having ' + artistName + ' perform at ' + venueName + '.');
  lines.push('');
  lines.push('Here\'s everything you need:');
  lines.push('');
  
  if (mediaPackComponents.epk.included) {
    lines.push('── EPK ──');
    lines.push('Link: https://dylancrowemusic.github.io/epk');
    lines.push('');
  }
  if (mediaPackComponents.bio.included) {
    lines.push('── BIO ──');
    lines.push('Dylan Crowe is a solo musician touring Australia — one guitar, one dog, every town. Raw, authentic performances blending folk, blues, and roots.');
    lines.push('');
  }
  if (mediaPackComponents.quotes.included) {
    lines.push('── PRESS QUOTES ──');
    lines.push('"A voice that stops you in your tracks." — RTRFM');
    lines.push('"Genuine, heartfelt, and unmissable." — Tone Deaf');
    lines.push('');
  }
  if (mediaPackComponents.photos.included) {
    lines.push('── PHOTOS ──');
    lines.push('Hi-res: https://dylancrowemusic.github.io/photos');
    lines.push('');
  }
  if (mediaPackComponents.videos.included) {
    lines.push('── VIDEOS ──');
    lines.push('Live: https://youtube.com/@dylancrowemusic');
    lines.push('Reels: https://instagram.com/' + artistIG.replace('@',''));
    lines.push('');
  }
  if (mediaPackComponents.tech.included) {
    lines.push('── TECH REQUIREMENTS ──');
    lines.push('• 1× vocal mic (SM58 or similar)');
    lines.push('• 1× DI box for acoustic guitar');
    lines.push('• 2× floor monitors');
    lines.push('• PA with mixing (or bring own)');
    lines.push('');
  }
  if (mediaPackComponents.availability.included) {
    lines.push('── AVAILABILITY ──');
    if (gigDate) lines.push('Date: ' + gigDate);
    lines.push('Touring Aug–Dec 2026');
    lines.push('');
  }
  if (mediaPackComponents.tcs.included) {
    lines.push('── TERMS & CONDITIONS ──');
    lines.push('Fee: $' + fee);
    lines.push('Payment: Cash or transfer on the night');
    lines.push('Cancellation: 48hrs notice required');
    lines.push('Performance: 2× 45min sets + sound check');
    lines.push('Merch: Artist retains 100%');
    lines.push('');
  }
  
  lines.push('Looking forward to it!');
  lines.push('');
  lines.push(artistName);
  lines.push(artistEmail + ' | ' + artistIG);
  
  return lines.join('\n');
}

  html += '</div>';
  
  var sheet = ensureModalSheet('tc-modal');

};

function buildTcsText(venueName, gigDate, fee, setTimes, setDuration) {
  var artistName = (D.meta && D.meta.artist && D.meta.artist.name) || 'Dylan Crowe';
  var subject = 'Dylan Crowe — Terms & Conditions for ' + venueName + (gigDate ? ' (' + gigDate + ')' : '');
  
  var lines = [];
  lines.push('Subject: ' + subject);
  lines.push('');
  lines.push('TERMS & CONDITIONS');
  lines.push('');
  lines.push('Venue: ' + venueName);
  if (gigDate) lines.push('Date: ' + gigDate);
  if (setTimes) lines.push('Set Times: ' + setTimes);
  lines.push('');
  lines.push('Fee: $' + fee);
  lines.push('Payment: Cash or bank transfer on the night');
  lines.push('Cancellation: 48hrs notice required (either party)');
  lines.push('Included: 1× ' + setDuration + 'min performance + sound check');
  lines.push('Merch: Artist retains 100% of merchandise sales');
  lines.push('PA: Provided by venue (unless otherwise agreed)');
  lines.push('Accommodation: Not required');
  lines.push('');
  lines.push('Please confirm by reply to lock in the date.');
  lines.push('');
  lines.push(artistName);
  
  return lines.join('\n');
}

/* ── Safe value getter (returns null if element doesn't exist) ── */
function valSafe(id) {
  var el = document.getElementById(id);
  if (!el) return null;
  return el.value;
}

/* ── Ensure modal exists (create if not) ── */
function ensureModalSheet(modalId) {
  var modal = document.getElementById(modalId);
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = modalId;
    var sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    modal.appendChild(sheet);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.classList.remove('show');
    });
    document.body.appendChild(modal);
    return sheet;
  }
  var sheet = modal.querySelector('.modal-sheet');
  if (!sheet) {
    sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    modal.appendChild(sheet);
  }
  return sheet;
}

/* ── Copy to clipboard ── */
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(textarea);
}

/* ── Add todo ── */
function addTodo(text, category, priority, dueDate, sourceType, sourceId) {
  D.todos = D.todos || [];
  D.todos.push({
    id: 'todo-' + Date.now(),
    text: text,
    category: category || 'venue',
    priority: priority || 'medium',
    due_date: dueDate || '',
    completed: false,
    completed_at: null,
    auto_generated: true,
    source_entity_type: sourceType || '',
    source_entity_id: sourceId || '',
    created_at: new Date().toISOString().slice(0,10),
    updated_at: new Date().toISOString()
  });
  saveEdits();
}

/* ── Escape helpers ── */
function escAttr(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Toast (use existing if available, else fallback) ── */
function showToast(msg) {
  if (typeof window.showToast === 'function') {
    window.showToast(msg);
  } else {
    var toast = document.getElementById('toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'toast';
      toast.id = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { toast.classList.remove('show'); }, 2500);
  }
}

<!-- ═══ V3 Finance & Busking ═══ -->
<script>
/* ═══════════════════════════════════════════════════════════════════════
   TOUR OS v3 — FINANCE & BUSKING MODULE
   Agent 4: Busking + Financials
   
   Renders:
   - Tour tab (div id="view-tour"): Route timeline + Stop detail + Busking session logging
   - Money tab (div id="view-money"): Financials dashboard + Income/Expense logging
   
   Depends on v3 data layer:
   - loadData(), saveData()
   - getAllEntities(type), getEntity(type, id)
   - createEntity(type, data), updateEntity(type, id, data), deleteEntity(type, id)
   - getCurrentStop(), setCurrentStop(id)
   - recalculateStop(stopId), recalculateAll()
   - generateId(prefix)
   ═══════════════════════════════════════════════════════════════════════ */

(function () {
  'use strict';

  // ── Helpers ────────────────────────────────────────────────────────────

  /** Format a number as AUD currency: $X,XXX.XX */
  function fmt$(amount) {
    var n = Number(amount) || 0;
    return '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  /** Format a date string (YYYY-MM-DD) to a readable label */
  function fmtDate(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
  }

  /** Format a date range */
  function fmtDateRange(a, b) {
    if (!a && !b) return '';
    if (!b || a === b) return fmtDate(a);
    return fmtDate(a) + ' – ' + fmtDate(b);
  }

  /** Escape HTML */
  function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /** Clamp a value between min and max */
  function clamp(val, min, max) {
    val = Number(val) || 0;
    return Math.max(min, Math.min(max, val));
  }

  /** Percentage helper — returns "XX%" string */
  function pct(numerator, denominator) {
    var d = Number(denominator) || 0;
    if (d === 0) return '0%';
    return Math.round((Number(numerator) || 0) / d * 100) + '%';
  }

  /** Today's date as YYYY-MM-DD */
  function today() {
    var d = new Date();
    var mo = String(d.getMonth() + 1).padStart(2, '0');
    var da = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + mo + '-' + da;
  }

  /** Show a toast (if showToast exists, else alert) */
  function notify(msg) {
    if (typeof showToast === 'function') showToast(msg);
    else alert(msg);
  }

  /** Open/close modal helpers (use global modal system if available) */
  var modalCounter = 0;

  function openModalSheet(id, contentHTML, opts) {
    opts = opts || {};
    var overlayId = 'v3modal-' + id;
    var existing = document.getElementById(overlayId);
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay show';
    overlay.id = overlayId;
    overlay.style.zIndex = opts.zIndex || 350;

    var sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    sheet.innerHTML = contentHTML;

    overlay.appendChild(sheet);

    // Close on overlay click (but not sheet click)
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeModalSheet(id);
    });

    document.body.appendChild(overlay);
    return overlay;
  }

  function closeModalSheet(id) {
    var overlay = document.getElementById('v3modal-' + id);
    if (overlay) overlay.remove();
  }

  // Close sheet when clicking elements with data-close="id"
  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-close-sheet]');
    if (el) {
      var sid = el.getAttribute('data-close-sheet');
      closeModalSheet(sid);
    }
  });

  // ── Income type labels & colors ────────────────────────────────────────
  var INCOME_TYPES = {
    busking: { label: 'Busking', color: '#22c55e', icon: '🎸' },
    gig_income: { label: 'Gig Income', color: '#00d2ff', icon: '🎤' },
    house_concert: { label: 'House Concert', color: '#f59e0b', icon: '🏠' },
    merch: { label: 'Merch', color: '#a855f7', icon: '👕' },
    other: { label: 'Other', color: '#8888aa', icon: '💰' }
  };

  var EXPENSE_CATEGORIES = {
    fuel: { label: 'Fuel', color: '#ef4444', icon: '⛽' },
    accommodation: { label: 'Accommodation', color: '#8b5cf6', icon: '🏨' },
    food: { label: 'Food', color: '#f59e0b', icon: '🍔' },
    gear: { label: 'Gear', color: '#06b6d4', icon: '🎛️' },
    maverick: { label: 'Maverick', color: '#22c55e', icon: '🐕' },
    marketing: { label: 'Marketing', color: '#ec4899', icon: '📢' },
    vehicle_maintenance: { label: 'Vehicle Maint.', color: '#f97316', icon: '🔧' },
    misc: { label: 'Misc', color: '#8888aa', icon: '📦' }
  };

  // ═══════════════════════════════════════════════════════════════════════
  // PART A: TOUR TAB
  // ═══════════════════════════════════════════════════════════════════════

  /** Current state for Tour tab */
  var tourState = {
    subview: 'route',      // 'route' | 'calendar'
    selectedStopId: null,  // when in stop detail
    stopDetailTab: 'busking' // 'busking' | 'gigs' | 'financials'
  };

  // ── Main render entry point for Tour tab ───────────────────────────────
  function renderTour() {
    var container = document.getElementById('view-tour');
    if (!container) return;

    // If a stop is selected, show stop detail
    if (tourState.selectedStopId) {
      container.innerHTML = renderStopDetailHTML(tourState.selectedStopId);
      bindStopDetailEvents();
      return;
    }

    // Segmented control: Route | Calendar
    var html = '' +
      '<div style="display:flex;gap:0.3rem;margin-bottom:1rem;background:var(--card);border-radius:10px;padding:3px;">' +
        '<button id="v3-tour-seg-route" class="tab-btn ' + (tourState.subview === 'route' ? 'active' : '') + '" style="flex:1;text-align:center;">🗺️ Route</button>' +
        '<button id="v3-tour-seg-calendar" class="tab-btn ' + (tourState.subview === 'calendar' ? 'active' : '') + '" style="flex:1;text-align:center;">📅 Calendar</button>' +
      '</div>';

    // Todos section
    var todos = TourOS.getAllEntities('todos') || [];
    html += '<div class="section-title">📋 Todos (' + todos.filter(function(t){return !t.completed;}).length + ' open)</div>';
    if (todos.length === 0) {
      html += '<div class="empty-state" style="padding:1rem;font-size:0.75rem;">No todos yet. Tap + to add one.</div>';
    } else {
      todos.forEach(function(todo) {
        var prioColor = todo.priority === 'high' ? 'var(--red)' : (todo.priority === 'medium' ? 'var(--amber)' : 'var(--text-muted)');
        var overdue = todo.due_date && todo.due_date < new Date().toISOString().slice(0,10) && !todo.completed;
        html += '<div class="entity-card" style="opacity:' + (todo.completed ? '0.5' : '1') + ';">' +
          '<div class="entity-hdr">' +
            '<div>' +
              '<div class="entity-name" style="' + (todo.completed ? 'text-decoration:line-through;' : '') + '">' + esc(todo.text) + '</div>' +
              '<div class="entity-sub">' + esc(todo.category || 'ops') +
              (todo.due_date ? ' · due ' + fmtDate(todo.due_date) : '') +
              (overdue ? ' ⚠️ overdue' : '') + '</div>' +
            '</div>' +
            '<button class="venue-btn" style="font-size:0.6rem;min-height:44px;padding:4px 8px;" data-toggle-todo="' + esc(todo.id) + '">' +
              (todo.completed ? '↩' : '✓') + '</button>' +
          '</div>' +
          (todo.priority ? '<div style="margin-top:0.2rem;"><span class="badge" style="background:' + prioColor + '22;color:' + prioColor + ';">' + esc(todo.priority) + '</span></div>' : '') +
        '</div>';
      });
    }

    // Spacer between todos and route
    html += '<div style="height:0.5rem;"></div>';

    if (tourState.subview === 'calendar') {
      html += '<div class="empty-state">' +
        '<div style="font-size:2rem;margin-bottom:0.5rem">📅</div>' +
        '<div style="font-weight:700;margin-bottom:0.3rem">Calendar View</div>' +
        '<div>Coming in Phase 2</div>' +
        '<div style="font-size:0.65rem;margin-top:0.5rem;color:var(--text-faint)">Unified calendar for gigs, busking sessions, HC shows, and travel.</div>' +
      '</div>';
    } else {
      html += renderRouteTimeline();
    }

    container.innerHTML = html;

    // Bind segmented control
    var routeBtn = document.getElementById('v3-tour-seg-route');
    var calBtn = document.getElementById('v3-tour-seg-calendar');
    if (routeBtn) routeBtn.addEventListener('click', function () {
      tourState.subview = 'route';
      renderTour();
    });
    if (calBtn) calBtn.addEventListener('click', function () {
      tourState.subview = 'calendar';
      renderTour();
    });

    // Bind stop card clicks
    container.querySelectorAll('[data-stop-id]').forEach(function (el) {
      el.addEventListener('click', function () {
        tourState.selectedStopId = el.getAttribute('data-stop-id');
        renderTour();
      });
    });

    // Bind todo toggle
    container.querySelectorAll('[data-toggle-todo]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var todoId = btn.getAttribute('data-toggle-todo');
        var todo = TourOS.getEntity('todos', todoId);
        if (todo) {
          todo.completed = !todo.completed;
          todo.completed_at = todo.completed ? new Date().toISOString() : null;
          todo.updated_at = new Date().toISOString();
          TourOS.updateEntity('todos', todoId, todo);
          TourOS.saveData();
          showToast(todo.completed ? '✓ Todo completed' : '↩ Todo reopened');
          renderTour();
        }
      });
    });
  }

  // ── Route Timeline ─────────────────────────────────────────────────────
  function renderRouteTimeline() {
    var stops = getAllEntities('tour_stops') || [];
    if (stops.length === 0) {
      return '<div class="empty-state">No tour stops yet. Add stops in Settings.</div>';
    }

    // Sort by arrival date
    stops.sort(function (a, b) {
      return (a.arrival_date || '').localeCompare(b.arrival_date || '');
    });

    var currentStop = getCurrentStop();

    var html = '<div class="section-title">Tour Route — ' + stops.length + ' Stops</div>';
    html += '<div class="timeline">';

    stops.forEach(function (stop, idx) {
      var status = stop.status || 'planned';
      var isCurrent = status === 'current';
      var isCompleted = status === 'completed';

      // Dot class
      var dotClass = 'planned';
      if (isCurrent) dotClass = 'current';
      else if (isCompleted) dotClass = 'completed';

      // Badge
      var badgeClass = dotClass;
      var badgeLabel = status.charAt(0).toUpperCase() + status.slice(1);

      // Progress bars
      var targets = stop.targets || {};
      var actuals = stop.actuals || {};

      // Support both v3 flat structure and nested structure
      var bTargetSessions = targets.busking_sessions || (targets.busking && targets.busking.sessions_target) || 0;
      var bActualSessions = actuals.busking_sessions || (actuals.busking && actuals.busking.sessions_completed) || 0;
      var bPct = bTargetSessions > 0 ? clamp(bActualSessions / bTargetSessions * 100, 0, 100) : 0;

      var gTargetGigs = targets.gigs || (targets.venue_gig && targets.venue_gig.gigs_target) || 0;
      var gActualGigs = actuals.gigs_played || (actuals.venue_gig && actuals.venue_gig.gigs_played) || 0;
      var gPct = gTargetGigs > 0 ? clamp(gActualGigs / gTargetGigs * 100, 0, 100) : 0;

      var hTargetShows = targets.hc_shows || (targets.house_concert && targets.house_concert.shows_target) || 0;
      var hActualShows = actuals.hc_completed || (actuals.house_concert && actuals.house_concert.shows_completed) || 0;
      var hPct = hTargetShows > 0 ? clamp(hActualShows / hTargetShows * 100, 0, 100) : 0;

      var isActive = currentStop && currentStop.id === stop.id;

      html += '<div class="stop-node">' +
        '<div class="stop-dot ' + dotClass + '"></div>' +
        '<div class="stop-card ' + (isActive ? 'active' : '') + '" data-stop-id="' + esc(stop.id) + '">' +
          '<div class="stop-hdr">' +
            '<div>' +
              '<span class="stop-name">' + esc(stop.name) + ', ' + esc(stop.state || '') + '</span>' +
              ' <span class="stop-num">#' + (idx + 1) + '</span>' +
            '</div>' +
            '<span class="stop-badge ' + badgeClass + '">' + esc(badgeLabel) + '</span>' +
          '</div>' +
          '<div class="stop-meta">' + fmtDateRange(stop.arrival_date, stop.departure_date) + (stop.segment ? ' · ' + esc(stop.segment) : '') + '</div>' +
          '<div class="stop-bars">' +
            '<div class="stop-bar" title="Busking: ' + bActualSessions + '/' + bTargetSessions + ' sessions"><div class="stop-bar-fill busking" style="width:' + bPct + '%"></div></div>' +
            '<div class="stop-bar" title="Gigs: ' + gActualGigs + '/' + gTargetGigs + ' gigs"><div class="stop-bar-fill gig" style="width:' + gPct + '%"></div></div>' +
            '<div class="stop-bar" title="HC: ' + hActualShows + '/' + hTargetShows + ' shows"><div class="stop-bar-fill house" style="width:' + hPct + '%"></div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    });

    html += '</div>';
    return html;
  }

  // ── Stop Detail ────────────────────────────────────────────────────────
  function renderStopDetailHTML(stopId) {
    var stop = getEntity('tour_stops', stopId);
    if (!stop) {
      tourState.selectedStopId = null;
      return '<div class="empty-state">Stop not found. <button class="venue-btn" onclick="window._v3TourBack()">← Back</button></div>';
    }

    var status = stop.status || 'planned';
    var badgeClass = status === 'current' ? 'current' : (status === 'completed' ? 'completed' : 'planned');

    var html = '' +
      '<div style="margin-bottom:0.8rem;">' +
        '<button class="venue-btn" id="v3-stop-back">← Back to Route</button>' +
      '</div>';

    // Stop detail header
    html += '<div class="stop-detail-hdr">' +
      '<div class="stop-detail-name">' + esc(stop.name) + ', ' + esc(stop.state || '') + '</div>' +
      '<div class="stop-detail-meta">' +
        fmtDateRange(stop.arrival_date, stop.departure_date) +
        (stop.segment ? ' · ' + esc(stop.segment) : '') +
      '</div>' +
      '<div style="margin-top:0.4rem;">' +
        '<span class="stop-badge ' + badgeClass + '">' + esc(status.charAt(0).toUpperCase() + status.slice(1)) + '</span>' +
      '</div>' +
    '</div>';

    // Tabs: Busking | Gigs | Financials
    var activeTab = tourState.stopDetailTab;
    html += '<div class="tab-bar">' +
      '<button class="tab-btn busking ' + (activeTab === 'busking' ? 'active' : '') + '" data-tab="busking">🎸 Busking</button>' +
      '<button class="tab-btn gig ' + (activeTab === 'gigs' ? 'active' : '') + '" data-tab="gigs">🎤 Gigs</button>' +
      '<button class="tab-btn house ' + (activeTab === 'financials' ? 'active' : '') + '" data-tab="financials">💰 Financials</button>' +
    '</div>';

    // Tab content
    if (activeTab === 'busking') {
      html += renderStopBuskingTab(stop);
    } else if (activeTab === 'gigs') {
      html += renderStopGigsTab(stop);
    } else {
      html += renderStopFinancialsTab(stop);
    }

    return html;
  }

  // ── Stop Detail: Busking Tab ───────────────────────────────────────────
  function renderStopBuskingTab(stop) {
    var spots = (getAllEntities('busking_spots') || []).filter(function (s) {
      return s.tour_stop_id === stop.id;
    });

    // Sync spot IDs from stop if available
    if (stop.busking_spot_ids && stop.busking_spot_ids.length > 0 && spots.length === 0) {
      // Try matching by id reference
      stop.busking_spot_ids.forEach(function (sid) {
        var spot = getEntity('busking_spots', sid);
        if (spot) spots.push(spot);
      });
    }

    var html = '' +
      '<div style="display:flex;gap:0.4rem;margin-bottom:0.8rem;">' +
        '<button class="venue-btn advance" id="v3-log-session" style="flex:1;font-size:0.72rem;">📝 Log Session</button>' +
        '<button class="venue-btn call" id="v3-add-spot" style="flex:1;font-size:0.72rem;">➕ Add Spot</button>' +
      '</div>';

    if (spots.length === 0) {
      html += '<div class="empty-state">' +
        '<div style="font-size:1.5rem;margin-bottom:0.3rem">🎸</div>' +
        '<div>No busking spots for ' + esc(stop.name) + ' yet.</div>' +
        '<div style="font-size:0.65rem;margin-top:0.3rem;color:var(--text-faint)">Tap "Add Spot" to discover a new location.</div>' +
      '</div>';
      return html;
    }

    html += '<div class="section-title">Busking Spots (' + spots.length + ')</div>';

    spots.forEach(function (spot) {
      var stats = spot.earnings_stats || { total_earnings: 0, total_sessions: 0, avg_earnings: 0 };
      var sessions = spot.sessions || [];
      var rating = spot.traffic_rating || 0;
      var ratingStars = '';
      for (var i = 0; i < 5; i++) {
        ratingStars += i < rating ? '★' : '☆';
      }

      html += '<div class="entity-card" data-spot-id="' + esc(spot.id) + '" style="cursor:pointer;">' +
        '<div class="entity-hdr">' +
          '<div>' +
            '<div class="entity-name">' + esc(spot.name) + '</div>' +
            '<div class="entity-sub">' + esc(spot.city || '') + ' · <span style="color:var(--amber);">' + ratingStars + '</span></div>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<div style="font-size:0.8rem;font-weight:700;color:var(--busking-l);">' + fmt$(stats.total_earnings) + '</div>' +
            '<div class="entity-sub">' + (stats.total_sessions || sessions.length) + ' sessions</div>' +
          '</div>' +
        '</div>' +
        '<div class="entity-row">' +
          '<span class="lbl">Status</span>' +
          '<span style="font-size:0.65rem;text-transform:uppercase;">' + esc(spot.status || 'discovered') + '</span>' +
        '</div>' +
      '</div>';
    });

    return html;
  }

  // ── Stop Detail: Gigs Tab ──────────────────────────────────────────────
  function renderStopGigsTab(stop) {
    // Get gigs for this stop
    var gigs = (getAllEntities('gigs') || []).filter(function (g) {
      return g.tour_stop_id === stop.id;
    });

    // Also get venues for this stop (gigs may not exist yet)
    var venues = (getAllEntities('venues') || []).filter(function (v) {
      return v.tour_stop_id === stop.id;
    });

    var html = '';

    if (gigs.length === 0 && venues.length === 0) {
      html += '<div class="empty-state">' +
        '<div style="font-size:1.5rem;margin-bottom:0.3rem">🎤</div>' +
        '<div>No gigs for ' + esc(stop.name) + ' yet.</div>' +
        '<div style="font-size:0.65rem;margin-top:0.3rem;color:var(--text-faint)">Add venues in the Pipeline tab to start booking gigs.</div>' +
      '</div>';
      return html;
    }

    // Gigs list
    if (gigs.length > 0) {
      html += '<div class="section-title">Booked Gigs (' + gigs.length + ')</div>';
      gigs.forEach(function (gig) {
        var venue = gig.venue_id ? getEntity('venues', gig.venue_id) : null;
        var venueName = venue ? venue.name : 'Unknown Venue';
        var statusBadge = gig.status || 'booked';
        var incomeBadge = gig.income_logged ? '<span class="pct-badge" style="background:rgba(34,197,94,0.15);color:var(--green-bright);">Income Logged</span>' : '<span class="pct-badge" style="background:rgba(245,158,11,0.15);color:#f59e0b;">Income Pending</span>';

        html += '<div class="entity-card" data-gig-id="' + esc(gig.id) + '" style="cursor:pointer;">' +
          '<div class="entity-hdr">' +
            '<div>' +
              '<div class="entity-name">' + esc(venueName) + '</div>' +
              '<div class="entity-sub">' + fmtDate(gig.date) + (gig.set_times ? ' · ' + esc(gig.set_times) : '') + '</div>' +
            '</div>' +
            '<div style="text-align:right;">' +
              '<div style="font-size:0.8rem;font-weight:700;color:var(--gig-l);">' + fmt$(gig.fee) + '</div>' +
              incomeBadge +
            '</div>' +
          '</div>' +
          '<div class="entity-row">' +
            '<span class="lbl">Status</span>' +
            '<span style="font-size:0.65rem;text-transform:uppercase;font-weight:700;">' + esc(statusBadge) + '</span>' +
          '</div>' +
        '</div>';
      });
    }

    // Venues without gigs (pipeline)
    if (venues.length > 0) {
      var unbooked = venues.filter(function (v) {
        return !gigs.some(function (g) { return g.venue_id === v.id; });
      });
      if (unbooked.length > 0) {
        html += '<div class="section-title" style="margin-top:1rem;">Pipeline Venues (' + unbooked.length + ')</div>';
        unbooked.forEach(function (venue) {
          html += '<div class="entity-card">' +
            '<div class="entity-hdr">' +
              '<div>' +
                '<div class="entity-name">' + esc(venue.name) + '</div>' +
                '<div class="entity-sub">' + esc(venue.type || '') + ' · ' + esc(venue.city || '') + '</div>' +

            '</div>' +
          '</div>';
        });
      }
    }

    return html;
  }

  // ── Stop Detail: Financials Tab ────────────────────────────────────────
  function renderStopFinancialsTab(stop) {
    var targets = stop.targets || {};
    var actuals = stop.actuals || {};
    var fin = stop.financials || {};

    // Projected vs actual income
    var projectedIncome = fin.projected_income || 0;
    var actualIncome = fin.actual_income || 0;
    var actualExpenses = fin.actual_expenses || 0;
    var net = fin.net !== undefined ? fin.net : (actualIncome - actualExpenses);

    // Recalculate from income/expense logs to ensure accuracy
    var incomes = (getAllEntities('income_log') || []).filter(function (i) {
      return i.tour_stop_id === stop.id;
    });
    var expenses = (getAllEntities('expense_log') || []).filter(function (e) {
      return e.tour_stop_id === stop.id;
    });
    var calcIncome = incomes.reduce(function (sum, i) { return sum + (Number(i.amount) || 0); }, 0);
    var calcExpenses = expenses.reduce(function (sum, e) { return sum + (Number(e.amount) || 0); }, 0);
    var calcNet = calcIncome - calcExpenses;

    // Use calculated values (more accurate)
    actualIncome = calcIncome;
    actualExpenses = calcExpenses;
    net = calcNet;

    var html = '<div class="fin-card">' +
      '<div class="fin-row income"><span class="lbl">Projected Income</span><span class="val">' + fmt$(projectedIncome) + '</span></div>' +
      '<div class="fin-row income"><span class="lbl">Actual Income</span><span class="val">' + fmt$(actualIncome) + '</span></div>' +
      '<div class="fin-row expense"><span class="lbl">Actual Expenses</span><span class="val">-' + fmt$(actualExpenses) + '</span></div>' +
      '<div class="fin-row fin-total"><span>Net</span><span style="color:' + (net >= 0 ? 'var(--green-bright)' : 'var(--expense)') + '">' + fmt$(net) + '</span></div>' +
    '</div>';

    // Editable projection
    html += '<div class="section-title">Edit Projections</div>';
    html += '<div class="fin-card">' +
      '<div class="modal-field">' +
        '<label>Projected Income ($)</label>' +
        '<input type="number" step="0.01" value="' + projectedIncome + '" data-projection="projected_income" data-stop-id="' + esc(stop.id) + '" style="width:100%;padding:0.6rem;border-radius:8px;border:1px solid var(--card-brd);background:rgba(0,0,0,0.3);color:var(--off-white);font-size:0.85rem;min-height:44px;" />' +
      '</div>' +
    '</div>';

    // Income breakdown for this stop
    if (incomes.length > 0) {
      html += '<div class="section-title" style="margin-top:1rem;">Income Breakdown</div>';
      html += '<div class="fin-card">';
      var incomeByType = {};
      incomes.forEach(function (i) {
        var t = i.type || 'other';
        incomeByType[t] = (incomeByType[t] || 0) + (Number(i.amount) || 0);
      });
      Object.keys(incomeByType).forEach(function (type) {
        var typeInfo = INCOME_TYPES[type] || INCOME_TYPES.other;
        var amt = incomeByType[type];
        var barPct = actualIncome > 0 ? clamp(amt / actualIncome * 100, 0, 100) : 0;
        html += '<div class="fin-row income">' +
          '<span class="lbl">' + typeInfo.icon + ' ' + esc(typeInfo.label) + '</span>' +
          '<span class="val">' + fmt$(amt) + '</span>' +
        '</div>' +
        '<div class="stream-bar" style="margin:0.2rem 0 0.5rem;"><div class="stream-bar-fill" style="width:' + barPct + '%;background:' + typeInfo.color + ';"></div></div>';
      });
      html += '</div>';
    }

    // Expense breakdown for this stop
    if (expenses.length > 0) {
      html += '<div class="section-title" style="margin-top:1rem;">Expense Breakdown</div>';
      html += '<div class="fin-card">';
      var expByCat = {};
      expenses.forEach(function (e) {
        var c = e.category || 'misc';
        expByCat[c] = (expByCat[c] || 0) + (Number(e.amount) || 0);
      });
      Object.keys(expByCat).forEach(function (cat) {
        var catInfo = EXPENSE_CATEGORIES[cat] || EXPENSE_CATEGORIES.misc;
        var amt = expByCat[cat];
        var barPct = actualExpenses > 0 ? clamp(amt / actualExpenses * 100, 0, 100) : 0;
        html += '<div class="fin-row expense">' +
          '<span class="lbl">' + catInfo.icon + ' ' + esc(catInfo.label) + '</span>' +
          '<span class="val">-' + fmt$(amt) + '</span>' +
        '</div>' +
        '<div class="stream-bar" style="margin:0.2rem 0 0.5rem;"><div class="stream-bar-fill" style="width:' + barPct + '%;background:' + catInfo.color + ';"></div></div>';
      });
      html += '</div>';
    }

    if (incomes.length === 0 && expenses.length === 0) {
      html += '<div class="empty-state" style="margin-top:1rem;">No transactions logged for this stop yet.</div>';
    }

    return html;
  }

  function saveBuskingSession(stopId) {
    var spotSelect = document.getElementById('v3-session-spot');
    var dateInput = document.getElementById('v3-session-date');
    var durationInput = document.getElementById('v3-session-duration');
    var earningsInput = document.getElementById('v3-session-earnings');
    var merchInput = document.getElementById('v3-session-merch');
    var notesInput = document.getElementById('v3-session-notes');

    if (!spotSelect || !spotSelect.value) {
      notify('Please select a spot (or quick add one)');
      return;
    }

    var spotId = spotSelect.value;
    var spotName = '';

    // Handle quick add
    if (spotId === '__quick_add') {
      var nameInput = document.getElementById('v3-quick-spot-name');
      var ratingInput = document.getElementById('v3-quick-spot-rating');
      if (!nameInput || !nameInput.value.trim()) {
        notify('Enter a name for the new spot');
        return;
      }
      spotName = nameInput.value.trim();
      var rating = parseInt(ratingInput ? ratingInput.value : '3') || 3;

      // Create new busking spot
      var newSpot = {
        id: generateId('bsk'),
        name: spotName,
        city: '',
        address: '',
        traffic_rating: rating,
        permit_required: false,
        permit_obtained: false,
        best_time: '',
        acoustics_notes: '',
        tour_stop_id: stopId,
        status: 'discovered',
        sessions: [],
        earnings_stats: { total_earnings: 0, total_sessions: 0, avg_earnings: 0 },
        tags: [],
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };
      newSpot = createEntity('busking_spots', newSpot);

      // Link to stop
      var stop = getEntity('tour_stops', stopId);
      if (stop) {
        if (!stop.busking_spot_ids) stop.busking_spot_ids = [];
        stop.busking_spot_ids.push(newSpot.id);
        stop.updated_at = new Date().toISOString();
        updateEntity('tour_stops', stopId, stop);
      }

      spotId = newSpot.id;
    } else {
      var existingSpot = getEntity('busking_spots', spotId);
      spotName = existingSpot ? existingSpot.name : 'Busking';
    }

    var date = dateInput ? dateInput.value : today();
    var duration = parseInt(durationInput ? durationInput.value : '120') || 0;
    var earnings = parseFloat(earningsInput ? earningsInput.value : '0') || 0;
    var merch = parseFloat(merchInput ? merchInput.value : '0') || 0;
    var notes = notesInput ? notesInput.value.trim() : '';

    // Create income_log entry
    var incomeEntry = {
      id: generateId('inc'),
      date: date,
      type: 'busking',
      amount: earnings + merch, // Include merch in total income if separate merch income entry needed
      source_entity_type: 'busking_spot',
      source_entity_id: spotId,
      tour_stop_id: stopId,
      payment_method: 'cash',
      merch_sales: merch,
      notes: notes || (duration + 'min session at ' + spotName),
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    incomeEntry = createEntity('income_log', incomeEntry);

    // If merch sales > 0, also create a merch income entry
    if (merch > 0) {
      var merchEntry = {
        id: generateId('inc'),
        date: date,
        type: 'merch',
        amount: merch,
        source_entity_type: 'busking_spot',
        source_entity_id: spotId,
        tour_stop_id: stopId,
        payment_method: 'cash',
        merch_sales: merch,
        notes: 'Merch sales during busking session at ' + spotName,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };
      createEntity('income_log', merchEntry);
      // Adjust the busking income entry to exclude merch (since merch is separate)
      incomeEntry.amount = earnings;
      updateEntity('income_log', incomeEntry.id, incomeEntry);
    }

    // Create session entry and append to spot's sessions[]
    var session = {
      id: generateId('ses'),
      date: date,
      duration_minutes: duration,
      earnings: earnings,
      merch_sales: merch,
      notes: notes,
      income_id: incomeEntry.id
    };

    var spot = getEntity('busking_spots', spotId);
    if (spot) {
      if (!spot.sessions) spot.sessions = [];
      spot.sessions.push(session);

      // Update earnings stats
      var totalEarnings = spot.sessions.reduce(function (sum, s) { return sum + (Number(s.earnings) || 0); }, 0);
      var totalSessions = spot.sessions.length;
      spot.earnings_stats = {
        total_earnings: totalEarnings,
        total_sessions: totalSessions,
        avg_earnings: totalSessions > 0 ? totalEarnings / totalSessions : 0
      };

      // Auto-update status: discovered → tested after first session
      if (spot.status === 'discovered') {
        spot.status = 'tested';
      }

      spot.updated_at = new Date().toISOString();
      updateEntity('busking_spots', spotId, spot);
    }

    // Update stop actuals
    var stopEntity = getEntity('tour_stops', stopId);
    if (stopEntity) {
      if (!stopEntity.actuals) stopEntity.actuals = {};
      // Support both flat and nested structures
      if (stopEntity.actuals.busking_sessions !== undefined) {
        stopEntity.actuals.busking_sessions = (stopEntity.actuals.busking_sessions || 0) + 1;
      } else if (stopEntity.actuals.busking) {
        stopEntity.actuals.busking.sessions_completed = (stopEntity.actuals.busking.sessions_completed || 0) + 1;
        stopEntity.actuals.busking.earnings_actual = (stopEntity.actuals.busking.earnings_actual || 0) + earnings;
      }
      stopEntity.updated_at = new Date().toISOString();
      updateEntity('tour_stops', stopId, stopEntity);
    }

    saveData();
    recalculateStop(stopId);

    closeModalSheet('log-session');
    notify('Session logged: ' + fmt$(earnings) + (merch > 0 ? ' + ' + fmt$(merch) + ' merch' : ''));

    // Re-render
    renderTour();
  }

  // ── Edit Session Modal ─────────────────────────────────────────────────
  function openEditSessionModal(spotId, sessionId) {
    var spot = getEntity('busking_spots', spotId);
    if (!spot || !spot.sessions) return;

    var session = spot.sessions.find(function (s) { return s.id === sessionId; });
    if (!session) return;

    var html = '' +
      '<div class="modal-hdr">' +
        '<div class="modal-title">✏️ Edit Session</div>' +
        '<button class="modal-close" data-close-sheet="edit-session">✕</button>' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Date</label>' +
        '<input type="date" id="v3-edit-session-date" value="' + esc(session.date || today()) + '" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Duration (minutes)</label>' +
        '<input type="number" id="v3-edit-session-duration" value="' + (session.duration_minutes || 120) + '" min="0" step="15" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Earnings ($)</label>' +
        '<input type="number" id="v3-edit-session-earnings" value="' + (session.earnings || 0) + '" min="0" step="0.01" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Merch Sales ($)</label>' +
        '<input type="number" id="v3-edit-session-merch" value="' + (session.merch_sales || 0) + '" min="0" step="0.01" />' +
      '</div>' +
      '<div class="modal-field">' +
        '<label>Notes</label>' +
        '<textarea id="v3-edit-session-notes" rows="2" style="min-height:50px;">' + esc(session.notes || '') + '</textarea>' +
      '</div>' +
      '<button class="modal-submit" id="v3-edit-session-save">Update Session</button>';

    openModalSheet('edit-session', html);

    var saveBtn = document.getElementById('v3-edit-session-save');
    if (saveBtn) saveBtn.addEventListener('click', function () {
      var date = (document.getElementById('v3-edit-session-date') || {}).value || today();
      var duration = parseInt((document.getElementById('v3-edit-session-duration') || {}).value) || 0;
      var earnings = parseFloat((document.getElementById('v3-edit-session-earnings') || {}).value) || 0;
      var merch = parseFloat((document.getElementById('v3-edit-session-merch') || {}).value) || 0;
      var notes = ((document.getElementById('v3-edit-session-notes') || {}).value || '').trim();

      // Update session in spot
      session.date = date;
      session.duration_minutes = duration;
      session.earnings = earnings;
      session.merch_sales = merch;
      session.notes = notes;

      // Recalculate spot stats
      var totalEarnings = spot.sessions.reduce(function (sum, s) { return sum + (Number(s.earnings) || 0); }, 0);
      var totalSessions = spot.sessions.length;
      spot.earnings_stats = {
        total_earnings: totalEarnings,
        total_sessions: totalSessions,
        avg_earnings: totalSessions > 0 ? totalEarnings / totalSessions : 0
      };
      spot.updated_at = new Date().toISOString();
      updateEntity('busking_spots', spotId, spot);

      // Update income_log entry if linked
      if (session.income_id) {
        var income = getEntity('income_log', session.income_id);
        if (income) {
          income.amount = earnings;
          income.date = date;
          income.notes = notes || income.notes;
          income.updated_at = new Date().toISOString();
          updateEntity('income_log', income.id, income);
        }
      }

      saveData();
      if (spot.tour_stop_id) recalculateStop(spot.tour_stop_id);

      closeModalSheet('edit-session');
      closeModalSheet('spot-detail');
      notify('Session updated');
      openSpotDetailModal(spotId);
    });
  }

  // ── Delete Session ─────────────────────────────────────────────────────
  function deleteSession(spotId, sessionId) {
    if (!confirm('Delete this session? This cannot be undone.')) return;

    var spot = getEntity('busking_spots', spotId);
    if (!spot || !spot.sessions) return;

    var session = spot.sessions.find(function (s) { return s.id === sessionId; });
    if (!session) return;

    // Remove from spot
    spot.sessions = spot.sessions.filter(function (s) { return s.id !== sessionId; });

    // Recalculate stats
    var totalEarnings = spot.sessions.reduce(function (sum, s) { return sum + (Number(s.earnings) || 0); }, 0);
    var totalSessions = spot.sessions.length;
    spot.earnings_stats = {
      total_earnings: totalEarnings,
      total_sessions: totalSessions,
      avg_earnings: totalSessions > 0 ? totalEarnings / totalSessions : 0
    };
    spot.updated_at = new Date().toISOString();
    updateEntity('busking_spots', spotId, spot);

    // Delete linked income_log entry
    if (session.income_id) {
      deleteEntity('income_log', session.income_id);
    }

    saveData();
    if (spot.tour_stop_id) recalculateStop(spot.tour_stop_id);

    closeModalSheet('spot-detail');
    notify('Session deleted');
    openSpotDetailModal(spotId);
  }

  // ── Main render entry point for Money tab ──────────────────────────────

    var container = document.getElementById('view-money');
    if (!container) return;

    // Ensure recalculation
    if (typeof recalculateAll === 'function') {
      recalculateAll();
    }

    var config = (loadData() && loadData().config) || {};
    var tourTarget = config.tour_target || 37000;

    // Get all income and expenses
    var incomes = getAllEntities('income_log') || [];
    var expenses = getAllEntities('expense_log') || [];

    var totalExpenses = expenses.reduce(function (sum, e) { return sum + (Number(e.amount) || 0); }, 0);
    var netEarnings = grossEarnings - totalExpenses;
    var progressPct = tourTarget > 0 ? clamp(netEarnings / tourTarget * 100, 0, 100) : 0;

    // Header
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">' +
      '<div>' +
        '<div style="font-size:1.1rem;font-weight:800;">💰 Tour Financials</div>' +

      '<div class="stat-label">Gross Earnings</div>' +

        var val = parseFloat(input.value) || 0;
        var stop = getEntity('tour_stops', stopId);
        if (stop) {
          if (!stop.financials) stop.financials = {};
          stop.financials[field] = val;
          stop.updated_at = new Date().toISOString();
          updateEntity('tour_stops', stopId, stop);
          saveData();
          notify('Projection updated');
